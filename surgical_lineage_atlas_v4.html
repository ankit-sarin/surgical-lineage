 the American Ophthalmological Society, the Section on Ophthalmology of the American Medical Association, and the American Academy of Ophthalmology and Otolaryngology. It was the first specialty certifying board in the United States. The AOS is credited here as the primary society_founder because its 1913 Committee on Post-graduate Education initiated the standardization movement. The impetus was that 51% of ophthalmologists inducted into military service in World War I were found unqualified to practice their specialty. Representatives from the three founding organizations oversaw ABO certification programs from 1916 until 1982, when ABO became fully autonomous. This edge documents the prototype for the society-to-board spawning pattern that the graph tracks across surgery (ACS/ASA\u2192ABS 1937), orthopedics (AOA\u2192ABOS 1934), neurosurgery (Cushing Society\u2192ABNS 1940), and urology (AUA\u2192ABU 1935). The ABO predates all of them. End_year of 1982 reflects ABO gaining full organizational autonomy.", "module": "12_governance_societies", "source_name": "American Ophthalmological Society", "target_name": "American Board of Ophthalmology"}, {"source": 256, "target": 258, "edge_type": "institutional_founder", "start_year": 1923, "end_year": 1953, "temporal_range": "1923-1953", "evidence_citation": "Lahey_Archive_Founder", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Lahey founded the clinic with a massive early volume in thyroidectomies, establishing one of the first high-volume endocrine surgical centers.", "module": "12_governance_societies", "source_name": "Frank Lahey", "target_name": "Lahey Clinic"}, {"source": 254, "target": 192, "edge_type": "society_founder", "start_year": 1933, "end_year": 1937, "temporal_range": "1933-1937", "evidence_citation": "ABMS_Archive_Wilson", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Wilson spearheaded the organization of the Advisory Board for Medical Specialties (now ABMS), creating the umbrella organization that subsequently mandated the creation of the American Board of Surgery.", "module": "12_governance_societies", "source_name": "Louis B. Wilson", "target_name": "American Board of Medical Specialties"}, {"source": 257, "target": 192, "edge_type": "society_founder", "start_year": 1933, "end_year": 2026, "temporal_range": "1933-Present", "evidence_citation": "ABMS_Archive_Founding", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The American Board of Medical Specialties (ABMS) was founded in 1933 as the umbrella organization for specialty certification in the United States. The American Board of Ophthalmology (1916) and the American Board of Otolaryngology (1924) were among its founding member boards. As of 2026, ABMS oversees 24 member boards including ABS, ABNS, ABOS, ABU, and ABPS \u2014 all of which are existing nodes in the graph. This edge creates the ABMS node as a convergence point for the graph's entire board certification layer. ABMS is modeled as a society node because it functions as a governing federation of specialty boards, analogous to how ACS governs quality verification programs. The edge_type is society_founder because ABO was a founding member that created ABMS, not a subsidiary accredited by it. Future expansion (Priority 8) will connect the existing surgical boards (ABS, ABNS, ABOS, ABU) to ABMS via programmatic_accreditation edges, completing the governance convergence pattern.", "module": "12_governance_societies", "source_name": "American Board of Ophthalmology", "target_name": "American Board of Medical Specialties"}, {"source": 136, "target": 192, "edge_type": "programmatic_accreditation", "start_year": 1934, "end_year": 2026, "temporal_range": "1934-Present", "evidence_citation": "ABMS_Archive_MemberBoards", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The American Board of Orthopaedic Surgery (founded 1934 by the American Orthopaedic Association, already in graph) became a member board of ABMS. ABOS was founded one year after ABMS (1933), making it one of the earliest surgical boards to join the umbrella organization. This edge connects the independent orthopedics trunk (Knight\u2192Hospital for Ruptured and Crippled\u2192Gibney\u2192Campbell\u2192AOA\u2192ABOS) to the central governance hub, bridging the non-Halstedian orthopedic lineage into the same accreditation framework as the Halstedian surgical boards. The complete chain is: AOA\u2192ABOS\u2192ABMS, paralleling ACS/ASA\u2192ABS\u2192ABMS in the general surgery lineage.", "module": "12_governance_societies", "source_name": "American Board of Orthopaedic Surgery", "target_name": "American Board of Medical Specialties"}, {"source": 259, "target": 157, "edge_type": "society_founder", "start_year": 1935, "end_year": 1937, "temporal_range": "1935-1937", "evidence_citation": "PMID: 9742911", "evidence_type": "PMID", "confidence": "high", "notes": "Edward Archibald's 1935 ASA presidential address was spearheaded by Evarts Graham to form the American Board of Surgery within two years, making the ASA a direct institutional parent of the ABS. Citation upgraded to PMID in V4.", "module": "12_governance_societies", "source_name": "American Surgical Association", "target_name": "American Board of Surgery"}, {"source": 41, "target": 157, "edge_type": "society_founder", "start_year": 1937, "end_year": 1941, "temporal_range": "1937-1941", "evidence_citation": "PMID: 2446522", "evidence_type": "PMID", "confidence": "high", "notes": "Graham served as the principal architect and first chair of the American Board of Surgery, establishing formal national certification.", "module": "12_governance_societies", "source_name": "Evarts A. Graham", "target_name": "American Board of Surgery"}, {"source": 23, "target": 157, "edge_type": "society_founder", "start_year": 1937, "end_year": 1941, "temporal_range": "1937-1941", "evidence_citation": "PMID: 2446522", "evidence_type": "PMID", "confidence": "high", "notes": "Whipple was a founding member and key proponent of standardizing surgical training requirements through the Board.", "module": "12_governance_societies", "source_name": "Allen O. Whipple", "target_name": "American Board of Surgery"}, {"source": 147, "target": 157, "edge_type": "society_founder", "start_year": 1937, "end_year": 1937, "temporal_range": "1937", "evidence_citation": "PMID: 2446522", "evidence_type": "PMID", "confidence": "high", "notes": "The ACS was the primary institutional catalyst in founding the ABS, formally transferring fellowship credentialing to an independent specialty board.", "module": "12_governance_societies", "source_name": "American College of Surgeons", "target_name": "American Board of Surgery"}, {"source": 157, "target": 192, "edge_type": "programmatic_accreditation", "start_year": 1937, "end_year": 2026, "temporal_range": "1937-Present", "evidence_citation": "ABMS_Archive_MemberBoards", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The American Board of Surgery (founded 1937 by the ACS and ASA, both already in graph) became a member board of the American Board of Medical Specialties (ABMS, founded 1933). ABMS sets standards for initial certification and continuing certification (Maintenance of Certification) that all member boards must implement. As of 2026, ABMS oversees 24 member boards. The ABS is the certifying authority for general surgery and its subspecialties. This edge connects the graph's primary surgical certification node (ABS, degree 6) to the umbrella governance body, completing the society\u2192board\u2192umbrella chain: ACS/ASA\u2192ABS\u2192ABMS. The start_year of 1937 reflects ABS's founding and immediate membership in ABMS.", "module": "12_governance_societies", "source_name": "American Board of Surgery", "target_name": "American Board of Medical Specialties"}, {"source": 29, "target": 259, "edge_type": "governance_leadership", "start_year": 1938, "end_year": 1939, "temporal_range": "1938-1939", "evidence_citation": "ASA_Past_Presidents_Registry", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Dallas Burton Phemister (1882-1951) served as president of the American Surgical Association in 1938. Also served as president of the American College of Surgeons. Rush Medical College MD 1904 with postgraduate study in Europe \u2014 NOT Halsted-trained. He was the first full-time professor and chairman of surgery at the University of Chicago (1925-1947), where he recruited Charles Huggins (Nobel 1966) and Lester Dragstedt. He also chaired the Codman Registry of Bone Sarcoma (the oldest tumor registry in the US). Died of appendicitis at age 69 at Billings Hospital, Chicago. BRIDGE EDGE: Connects the UChicago 2-node island (Phemister + UChicago Dept) to the main component via ASA. CANDIDATE FOR PMID UPGRADE: search for Phemister ASA presidential address in Ann Surg 1938-1939.", "module": "12_governance_societies", "source_name": "Dallas Phemister", "target_name": "American Surgical Association"}, {"source": 11, "target": 260, "edge_type": "society_founder", "start_year": 1938, "end_year": 1941, "temporal_range": "1938-1941", "evidence_citation": "NLM_SUS_Archive", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The SUS was organized in 1938 in Baltimore by George G. Finney, I. Ridgeway Trimble, and Warfield M. Firor. Incorporated in 1941. The idea originated with Samuel J. Stabins, chief surgical resident at the University of Rochester. The SUS mission was explicitly Halstedian: members must have completed 'a rigorous training program in the tradition of Dr. William Halsted at Johns Hopkins Medical School' and hold a faculty position at a U.S. medical school. Active membership limited to surgeons under 45. Original trustees included Robert Zollinger and Frank Glenn. Now recognized as the world's premier organization for advancement of surgical sciences. Firor is selected as the source node because he was the most senior Hopkins-affiliated co-founder and connects the SUS directly to the Halstedian training lineage.", "module": "12_governance_societies", "source_name": "Warfield Firor", "target_name": "Society of University Surgeons"}, {"source": 23, "target": 259, "edge_type": "governance_leadership", "start_year": 1939, "end_year": 1940, "temporal_range": "1939-1940", "evidence_citation": "PMID: 37941365", "evidence_type": "PMID", "confidence": "high", "notes": "Whipple served as ASA president in 1939, connecting the independent Columbia surgical trunk to the oldest American surgical society. He used this platform to advocate for surgical education reform and standardization of operative techniques.", "module": "12_governance_societies", "source_name": "Allen O. Whipple", "target_name": "American Surgical Association"}, {"source": 41, "target": 147, "edge_type": "governance_leadership", "start_year": 1940, "end_year": 1941, "temporal_range": "1940-1941", "evidence_citation": "PMID: 21820677", "evidence_type": "PMID", "confidence": "high", "notes": "Graham served as President of the ACS, tightly coupling the pioneering thoracic surgery nodes in St. Louis with the primary national governance trunk.", "module": "12_governance_societies", "source_name": "Evarts A. Graham", "target_name": "American College of Surgeons"}, {"source": 143, "target": 261, "edge_type": "society_founder", "start_year": 1940, "end_year": 1975, "temporal_range": "1940-1975", "evidence_citation": "PMID: 32193716", "evidence_type": "PMID", "confidence": "high", "notes": "Five Memorial Hospital surgeons led by William MacComb founded the James Ewing Society as the hospital's surgical alumni organization, establishing the institutional root of organized surgical oncology.", "module": "12_governance_societies", "source_name": "Memorial Hospital for Cancer and Allied Diseases", "target_name": "James Ewing Society"}, {"source": 96, "target": 192, "edge_type": "programmatic_accreditation", "start_year": 1940, "end_year": 2026, "temporal_range": "1940-Present", "evidence_citation": "ABMS_Archive_MemberBoards", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The American Board of Neurological Surgery (founded 1940, catalyzed by the Harvey Cushing Society, already in graph) became a member board of ABMS. This edge connects the neurosurgical certification branch to the umbrella governance body, completing the chain: Cushing Society\u2192ABNS\u2192ABMS. Combined with the existing Cushing\u2192SNS\u2192Harvey Cushing Society\u2192ABNS edges, this creates a five-generation governance lineage from Cushing to ABMS spanning 1920-1940.", "module": "12_governance_societies", "source_name": "American Board of Neurological Surgery", "target_name": "American Board of Medical Specialties"}, {"source": 34, "target": 259, "edge_type": "governance_leadership", "start_year": 1943, "end_year": 1944, "temporal_range": "1943-1944", "evidence_citation": "PMID: 9742911", "evidence_type": "PMID", "confidence": "high", "notes": "Coller served as ASA president in 1943, joining the graph's existing ASA governance network (Whipple 1939, Wangensteen 1968, Sabiston, Bahnson, Najarian, Cameron). He also served as ACS president in 1949 and as the first Chairman of the RRC for Surgery in 1954, establishing the formal accreditation structure for surgical residency programs. Citation upgraded to PMID in V4.", "module": "12_governance_societies", "source_name": "Frederick Coller", "target_name": "American Surgical Association"}, {"source": 23, "target": 143, "edge_type": "governance_leadership", "start_year": 1946, "end_year": 1950, "temporal_range": "1946-1950", "evidence_citation": "MSK_Archive_Whipple", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Whipple was appointed Clinical Director of Memorial Hospital after retiring as Chair of Surgery at Columbia, tasked with making the hospital more academic and recruiting university-trained surgical residents.", "module": "12_governance_societies", "source_name": "Allen O. Whipple", "target_name": "Memorial Hospital for Cancer and Allied Diseases"}, {"source": 37, "target": 147, "edge_type": "governance_leadership", "start_year": 1953, "end_year": 1954, "temporal_range": "1953-1954", "evidence_citation": "ACS_Archive_Ochsner", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Ochsner served as ACS president, reinforcing the New Orleans/Tulane surgical lineage within the primary national governance structure.", "module": "12_governance_societies", "source_name": "Alton Ochsner", "target_name": "American College of Surgeons"}, {"source": 146, "target": 147, "edge_type": "governance_leadership", "start_year": 1958, "end_year": 2019, "temporal_range": "1958-2019", "evidence_citation": "PMID: 24753609", "evidence_type": "PMID", "confidence": "high", "notes": "Fisher was a Fellow of the ACS and recipient of its Jacobson Innovation Award, embedding the NSABP clinical trials framework within the broader surgical governance structure.", "module": "12_governance_societies", "source_name": "Bernard Fisher", "target_name": "American College of Surgeons"}, {"source": 48, "target": 147, "edge_type": "governance_leadership", "start_year": 1960, "end_year": 2016, "temporal_range": "1960-2016", "evidence_citation": "ACS_Archive_Cooley", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Cooley was a Fellow and major figure in the ACS throughout his career, linking the Blalock/DeBakey/Texas Heart lineage to national surgical governance.", "module": "12_governance_societies", "source_name": "Denton Cooley", "target_name": "American College of Surgeons"}, {"source": 262, "target": 1, "edge_type": "governance_leadership", "start_year": 1964, "end_year": 1984, "temporal_range": "1964-1984", "evidence_citation": "PMID: 29189382", "evidence_type": "PMID", "confidence": "high", "notes": "George D. Zuidema (1928-2020) received his MD from Johns Hopkins in 1953, trained at Massachusetts General Hospital (chief resident 1959), then joined the University of Michigan faculty. In 1964, at age 36, he was appointed surgeon-in-chief of Johns Hopkins Hospital and professor/director of surgery, succeeding Alfred Blalock. He held the Warfield M. Firor Professorship. His appointment initially caused controversy among Blalock's proteges, but he transformed the department by establishing separate departments for neurosurgery, orthopaedics, otolaryngology, urology, and general surgery with subspecialty divisions. He recruited Donlin Long (neurosurgery), Patrick Walsh (urology), and Bruce Reitz (cardiac surgery). John L. Cameron succeeded him in 1984. Zuidema then returned to the University of Michigan as vice provost for medical affairs (1984-1994). Citation upgraded to PMID in V4.", "module": "12_governance_societies", "source_name": "George Zuidema", "target_name": "Johns Hopkins Hospital Department of Surgery"}, {"source": 262, "target": 263, "edge_type": "society_founder", "start_year": 1966, "end_year": 1968, "temporal_range": "1966-1968", "evidence_citation": "PMID: 28918957", "evidence_type": "PMID", "confidence": "high", "notes": "The Association for Academic Surgery was founded in 1966 with 33 members. Zuidema was the founding member and first president (1968). The AAS mission was to offer young academic surgeons an inclusive forum for discussion about surgical research and professional growth, with active membership lasting 12 years after first academic appointment. Now over 4,000 members. The AAS represents the second wave of academic pipeline societies: the SUS (1938) required Halstedian-tradition training and faculty appointment for surgeons under 45; the AAS (1966) broadened access further to all young surgical academics. Together they form the academic pipeline: AAS (junior) \u2192 SUS (mid-career) \u2192 ASA/ACS (senior). Zuidema founded AAS while simultaneously serving as Hopkins surgeon-in-chief, making this society a product of the Hopkins institutional culture.", "module": "12_governance_societies", "source_name": "George Zuidema", "target_name": "Association for Academic Surgery"}, {"source": 26, "target": 259, "edge_type": "governance_leadership", "start_year": 1968, "end_year": 1969, "temporal_range": "1968-1969", "evidence_citation": "DOI: 10.1097/00000658-196909010-00001", "evidence_type": "DOI", "confidence": "high", "notes": "Wangensteen served as ASA president, his presidential address 'We Cannot Escape History' directly catalyzed the SOSSUS study of surgical education.", "module": "12_governance_societies", "source_name": "Owen Wangensteen", "target_name": "American Surgical Association"}, {"source": 38, "target": 147, "edge_type": "governance_leadership", "start_year": 1969, "end_year": 1970, "temporal_range": "1969-1970", "evidence_citation": "PMID: 18693427", "evidence_type": "PMID", "confidence": "high", "notes": "DeBakey served as ACS president, connecting the Tulane/Baylor cardiovascular lineage to the primary national surgical governance body.", "module": "12_governance_societies", "source_name": "Michael DeBakey", "target_name": "American College of Surgeons"}, {"source": 261, "target": 144, "edge_type": "institutional_succession", "start_year": 1975, "end_year": 2026, "temporal_range": "1975-Present", "evidence_citation": "PMID: 32193716", "evidence_type": "PMID", "confidence": "high", "notes": "The James Ewing Society was renamed and reorganized as the Society of Surgical Oncology in 1975, expanding from a Memorial Hospital alumni group to represent all surgical oncologists nationally.", "module": "12_governance_societies", "source_name": "James Ewing Society", "target_name": "Society of Surgical Oncology"}, {"source": 70, "target": 147, "edge_type": "governance_leadership", "start_year": 1976, "end_year": 1993, "temporal_range": "1976-1993", "evidence_citation": "PMID: 34462877", "evidence_type": "PMID", "confidence": "high", "notes": "Jonasson was the first woman to serve on the ACS Board of Regents (1976), the first woman chief of surgery at a major hospital (Cook County, 1977), and the first woman to chair an academic surgery department at a coeducational medical school (Ohio State, 1987, as Robert M. Zollinger Professor). She trained under Warren Cole at University of Illinois College of Medicine with a transplantation fellowship under Paul Russell at MGH. She performed the first kidney transplant in Illinois (1969) and later served on the American Board of Surgery and ACGME. Her 1993 ACS lecture 'Recapturing the Joy of Surgery' presciently identified surgeon burnout as an epidemic.", "module": "12_governance_societies", "source_name": "Olga Jonasson", "target_name": "American College of Surgeons"}, {"source": 57, "target": 259, "edge_type": "governance_leadership", "start_year": 1977, "end_year": 1978, "temporal_range": "1977-1978", "evidence_citation": "DOI: 10.1097/00000658-197809000-00001", "evidence_type": "DOI", "confidence": "high", "notes": "Sabiston served as ASA president; his presidential address honored Alfred Blalock, directly linking the Halsted-Blalock lineage to the oldest surgical society in the US.", "module": "12_governance_societies", "source_name": "David Sabiston", "target_name": "American Surgical Association"}, {"source": 70, "target": 157, "edge_type": "governance_leadership", "start_year": 1980, "end_year": 1990, "temporal_range": "1980-1990", "evidence_citation": "PMID: 17416546", "evidence_type": "PMID", "confidence": "high", "notes": "Jonasson served as a director on the American Board of Surgery and as a representative to the American Board of Medical Specialties, among the first women to hold these positions. She also served on the ACGME and the Residency Review Committee for Surgery. She was the 37th woman certified by the ABS (1965).", "module": "12_governance_societies", "source_name": "Olga Jonasson", "target_name": "American Board of Surgery"}, {"source": 264, "target": 265, "edge_type": "institutional_succession", "start_year": 1981, "end_year": 2026, "temporal_range": "1981-Present", "evidence_citation": "ACGME_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The ACGME was established as the independent successor to the LCGME, permanently centralizing and standardizing residency program accreditation.", "module": "12_governance_societies", "source_name": "Liaison Committee on Graduate Medical Education", "target_name": "Accreditation Council for Graduate Medical Education"}, {"source": 192, "target": 265, "edge_type": "programmatic_accreditation", "start_year": 1981, "end_year": 2026, "temporal_range": "1981-Present", "evidence_citation": "ACGME_Archive_ABMS", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The ABMS and ACGME operate as structurally coupled governance nodes, separating board certification from residency programmatic accreditation.", "module": "12_governance_societies", "source_name": "American Board of Medical Specialties", "target_name": "Accreditation Council for Graduate Medical Education"}, {"source": 266, "target": 267, "edge_type": "society_founder", "start_year": 1981, "end_year": 2026, "temporal_range": "1981-Present", "evidence_citation": "AWS_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Patricia Joy Numann (b. 1941), endocrine surgeon at SUNY Upstate Medical University, founded the Association of Women Surgeons (AWS) in 1981 by inviting as many female surgeons as she could identify to a breakfast at the October ACS Clinical Congress in San Francisco. At that time, there was no formal organization serving the needs of women surgeons. Numann served as AWS president (1986-1987) and the organization has since grown into a national society supporting women medical students, residents, and surgeons. Numann was also the first woman to chair the American Board of Surgery (1994-2002), the first woman second vice-president of the ACS (1999-2000), and the second woman president of the ACS (2011, 92nd president, after Kathryn Anderson). She received the ACS Lifetime Achievement Award in 2019, only the fourth surgeon so honored. The founding of AWS parallels the generational society pattern in the graph \u2014 a new organization emerging because the existing structures (ACS, ASA, SUS) did not adequately serve a constituency \u2014 in this case, women surgeons. The Nina Starr Braunwald Award of the AWS (which Numann received in 1998) is named after Nina Starr Braunwald, who is already a node in the graph, creating a cultural connection between these two women in surgery edges.", "module": "12_governance_societies", "source_name": "Patricia Numann", "target_name": "Association of Women Surgeons"}, {"source": 72, "target": 1, "edge_type": "governance_leadership", "start_year": 1984, "end_year": 2003, "temporal_range": "1984-2003", "evidence_citation": "PMID: 29189382", "evidence_type": "PMID", "confidence": "high", "notes": "Cameron served as Chairman of Surgery at Hopkins for 19 years, performing more Whipple resections than any surgeon in history and serving as president of 14 surgical societies including the ACS.", "module": "12_governance_societies", "source_name": "John L. Cameron", "target_name": "Johns Hopkins Hospital Department of Surgery"}, {"source": 57, "target": 147, "edge_type": "governance_leadership", "start_year": 1985, "end_year": 1986, "temporal_range": "1985-1986", "evidence_citation": "PMID: 356789", "evidence_type": "PMID", "confidence": "high", "notes": "Sabiston served as president of the ACS, reinforcing the governance connection between the Blalock/Hopkins surgical lineage and the primary national credentialing body. Citation upgraded to PMID in V4.", "module": "12_governance_societies", "source_name": "David Sabiston", "target_name": "American College of Surgeons"}, {"source": 53, "target": 259, "edge_type": "governance_leadership", "start_year": 1987, "end_year": 1988, "temporal_range": "1987-1988", "evidence_citation": "PMID: 3421751", "evidence_type": "PMID", "confidence": "high", "notes": "Bahnson served as ASA president, extending the Blalock/Hopkins/Pittsburgh lineage into ASA governance.", "module": "12_governance_societies", "source_name": "Henry Bahnson", "target_name": "American Surgical Association"}, {"source": 68, "target": 259, "edge_type": "governance_leadership", "start_year": 1988, "end_year": 1989, "temporal_range": "1988-1989", "evidence_citation": "PMID: 2774706", "evidence_type": "PMID", "confidence": "high", "notes": "Najarian served as ASA president, connecting the Wangensteen/Minnesota transplant lineage to the oldest US surgical society.", "module": "12_governance_societies", "source_name": "John Najarian", "target_name": "American Surgical Association"}, {"source": 66, "target": 147, "edge_type": "governance_leadership", "start_year": 1990, "end_year": 2012, "temporal_range": "1990-2012", "evidence_citation": "ACS_Bulletin_Starzl_Murray_Tribute", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Starzl TE. 'Joseph E. Murray, MD, FACS, opened doors for transplant surgeons.' Bull Am Coll Surg. 2013 Feb. Starzl's own tribute explicitly states: 'Dr. Murray, a former Regent and First Vice-President of the American College of Surgeons.' Murray was also awarded the Nobel Prize at the 1990 ACS Clinical Congress, where a press conference was held. This edge connects Murray to the graph's highest-degree node (ACS, degree 25), bridging the kidney transplant lineage into the central governance structure. Murray's ACS Regency parallels the governance edges of other surgical leaders in the graph (Longmire, Cooley, Leffall, Cameron, Sabiston, Ochsner, Fisher \u2014 all ACS governance). The Starzl-authored tribute is the most authoritative source for Murray's ACS governance roles.", "module": "12_governance_societies", "source_name": "Joseph E. Murray", "target_name": "American College of Surgeons"}, {"source": 78, "target": 147, "edge_type": "governance_leadership", "start_year": 1992, "end_year": 1993, "temporal_range": "1992-1993", "evidence_citation": "ACS_Archive_Austen", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Austen served as President of the American College of Surgeons (1992-1993), three years before Leffall's historic presidency (1995-1996). He also served on the ACS Board of Regents (1982-1991) including as Board Chair (1989-1991). This edge fills the 1990s temporal gap (only 6 edges in that decade currently) and strengthens the governance pipeline from MGH to ACS. Austen's ACS presidency creates a parallel MGH\u2192ACS pathway alongside the existing Franklin H. Martin\u2192ACS founder edge, and the Leffall\u2192ACS edge from Priority 1. Austen was also president of the American Surgical Association (1985), the American Heart Association, and the AATS \u2014 but those edges are not included here to maintain the governance standing threshold (one society-wide presidency edge per figure is sufficient to establish the governance connection).", "module": "12_governance_societies", "source_name": "W. Gerald Austen", "target_name": "American College of Surgeons"}, {"source": 266, "target": 157, "edge_type": "governance_leadership", "start_year": 1994, "end_year": 2002, "temporal_range": "1994-2002", "evidence_citation": "ACS_Archive_Numann", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Numann served as the first woman Chair of the American Board of Surgery from 1994 to 2002. The ABS is the central certification authority for general surgery in the United States and an existing high-degree node in the graph (degree 6, connected to ACS, ASA, ABMS, Whipple, SAGES/FLS). Numann's chairmanship bridges the women-in-surgery cluster to the graph's core governance infrastructure. Her ABS chairmanship (1994-2002) also fills the 1990s temporal gap \u2014 only 6 edges currently exist in that decade. Numann's ACS presidency (2011, second woman after Kathryn Anderson) is not included as a separate edge to avoid inflating her node degree beyond what the governance standing threshold warrants \u2014 one society-wide leadership edge per major organization is sufficient. The ABS chair edge is chosen over the ACS presidency because it represents the more historically distinctive achievement (first woman, versus second woman at ACS).", "module": "12_governance_societies", "source_name": "Patricia Numann", "target_name": "American Board of Surgery"}, {"source": 51, "target": 147, "edge_type": "governance_leadership", "start_year": 1995, "end_year": 1996, "temporal_range": "1995-1996", "evidence_citation": "ACS_Archive_Leffall", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Leffall served as President of the American College of Surgeons (1995-1996), the first African American to hold the position. He had previously served as ACS Secretary (1983-1992) and on multiple ACS committees. Leffall was also the first African American president of the American Cancer Society (1978), the Society of Surgical Oncology, and the Society of Surgical Chairmen. His ACS presidency connects the independent Howard/Drew lineage to the highest-degree governance node in the entire graph (ACS, degree 23). Leffall was one of only five surgeons in history to serve as president of both the ACS and the American Cancer Society. This edge represents the culmination of a chain spanning five nodes: Whipple (Columbia) \u2192 Drew (Howard) \u2192 Leffall (Howard/MSK) \u2192 ACS \u2014 linking an independent Black surgical training lineage to the central governance hub of American surgery.", "module": "12_governance_societies", "source_name": "LaSalle D. Leffall Jr.", "target_name": "American College of Surgeons"}, {"source": 72, "target": 259, "edge_type": "governance_leadership", "start_year": 2000, "end_year": 2001, "temporal_range": "2000-2001", "evidence_citation": "PMID: 29189382", "evidence_type": "PMID", "confidence": "high", "notes": "Cameron served as ASA president, directly extending the Halsted-Blalock-Hopkins lineage into 21st-century ASA governance. Citation upgraded to PMID in V4.", "module": "12_governance_societies", "source_name": "John L. Cameron", "target_name": "American Surgical Association"}, {"source": 83, "target": 259, "edge_type": "governance_leadership", "start_year": 2001, "end_year": 2002, "temporal_range": "2001-2002", "evidence_citation": "PMID: 12192325", "evidence_type": "PMID", "confidence": "high", "notes": "Debas HT. 'Surgery: A Noble Profession in a Changing World.' Ann Surg. 2002 Sep;236(3):263-269. PMC1422579. Published ASA presidential address for the 2001-2002 term. Debas discusses surgery as a profession, declining interest among medical students, and the growing importance of global health. This edge connects Debas to the ASA governance hub \u2014 the same high-degree node where Wangensteen, Sabiston, Bahnson, Najarian, and Cameron already have governance edges. Debas was also ACS president (Northern California chapter) and ASA president, creating a West Coast\u2192ASA governance bridge paralleling the existing East Coast dominance.", "module": "12_governance_societies", "source_name": "Haile T. Debas", "target_name": "American Surgical Association"}, {"source": 85, "target": 259, "edge_type": "governance_leadership", "start_year": 2005, "end_year": 2006, "temporal_range": "2005-2006", "evidence_citation": "ASA_Past_Presidents_Registry", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Pellegrini served as president of the American Surgical Association in 2005. Confirmed by the ASA Past Presidents registry (americansurgical.org). He was also the 94th president of the American College of Surgeons (installed October 2013). Additionally served as president of the Society of Surgical Chairs and was a director of the American Board of Surgery. Awarded the French Legion of Honor. CANDIDATE FOR PMID UPGRADE: search for Pellegrini ASA presidential address in Ann Surg 2005 or 2006.", "module": "12_governance_societies", "source_name": "Carlos A. Pellegrini", "target_name": "American Surgical Association"}, {"source": 72, "target": 147, "edge_type": "governance_leadership", "start_year": 2005, "end_year": 2006, "temporal_range": "2005-2006", "evidence_citation": "PMID: 29189382", "evidence_type": "PMID", "confidence": "high", "notes": "Cameron served as ACS president, directly extending the Halsted \u2192 Blalock \u2192 Hopkins surgical lineage into 21st-century governance. Citation upgraded to PMID in V4.", "module": "12_governance_societies", "source_name": "John L. Cameron", "target_name": "American College of Surgeons"}, {"source": 248, "target": 157, "edge_type": "governance_leadership", "start_year": 2005, "end_year": 2010, "temporal_range": "2005-2010", "evidence_citation": "PMID: 31003229", "evidence_type": "PMID", "confidence": "high", "notes": "Ponsky JL. 'Jeffrey L. Ponsky, MD, FACS.' VideoGIE. 2019 May;4(5):189-191. PMC6494182. Documents Ponsky as 'Director and Chairman of the American Board of Surgery.' He also served as SAGES president (already in graph as society_founder) and Vice President of the American Surgical Association. Ponsky trained at Case Western Reserve (medical school 1971, residency at University Hospitals Cleveland 1971-1976) and invented PEG (percutaneous endoscopic gastrostomy) in 1979 with Michael Gauderer. This edge is the single most important structural bridge between the MIS module and the graph backbone. ABS connects to ABMS (programmatic_accreditation, already in graph) and through it to the entire accreditation apparatus. Ponsky's ABS chairmanship means the co-inventor of PEG and co-founder of SAGES reached the top of the certification hierarchy for all general surgery. Ponsky goes from degree 1 to degree 2.", "module": "12_governance_societies", "source_name": "Jeffrey Ponsky", "target_name": "American Board of Surgery"}, {"source": 86, "target": 147, "edge_type": "governance_leadership", "start_year": 2018, "end_year": 2019, "temporal_range": "2018-2019", "evidence_citation": "Freischlag_ACS_Presidency", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Freischlag served as President of the American College of Surgeons 2018-2019. She had previously served as Governor (2000-2006), Regent (2006-2012), and first woman Chair of the Board of Regents (2012-2013). Her ACS presidency connects the women-in-surgery cluster to the governance backbone through a second presidential pathway alongside Leffall (1995-1996) and Numann (ABS chair). Also served as president of the Society for Vascular Surgery (first woman, 2014), Society of Surgical Chairs, and Association of VA Surgeons. ACS source: ACS Brief article, February 2026. CANDIDATE FOR PMID UPGRADE: search for Freischlag ACS presidential address in Bull Am Coll Surg or JACS 2018-2019.", "module": "12_governance_societies", "source_name": "Julie Ann Freischlag", "target_name": "American College of Surgeons"}, {"source": 268, "target": 50, "edge_type": "institutional_founder", "start_year": 1805, "end_year": 1831, "temporal_range": "1805-1831", "evidence_citation": "PMID: 22770963", "evidence_type": "PMID", "confidence": "high", "notes": "Philip Syng Physick (1768-1837), called the 'Father of American Surgery,' was elected the first professor of surgery at the University of Pennsylvania in 1805 \u2014 the first such chair in the United States. He held it until 1819 when he transferred to the anatomy chair (retiring 1831). Trained in London under John Hunter at St. George's Hospital (1788-1790), he was Hunter's first American house surgeon. He pioneered catgut sutures, the stomach pump, and tonsillectomy instruments. He was surgeon to Pennsylvania Hospital from 1794 to 1816 and treated Chief Justice John Marshall and First Lady Dolley Madison. His lectures prepared an entire generation of American surgeons. This edge extends the UPenn surgery lineage 140 years before Ravdin (1945), establishing an independent pre-Halsted Philadelphia surgical trunk. Physick and Halsted represent two distinct origin points for American academic surgery: Philadelphia (1805) and Baltimore (1889).", "module": "13_pre_halsted", "source_name": "Philip Syng Physick", "target_name": "University of Pennsylvania Department of Surgery"}, {"source": 269, "target": 270, "edge_type": "direct_training", "start_year": 1826, "end_year": 1828, "temporal_range": "1826-1828", "evidence_citation": "PMID: 16809223", "evidence_type": "PMID", "confidence": "high", "notes": "Samuel D. Gross (1805-1884) entered Jefferson Medical College in 1826 and graduated in 1828 in a class of 27 students. Jefferson was founded in 1824 by George McClellan, whom Gross greatly admired. Gross was the first alumnus to be appointed to a professorship there. After stints in Easton, Cincinnati (Medical College of Ohio, 1833-1840), and Louisville (1840-1856), he returned to Jefferson as professor of surgery in 1856 \u2014 completing a 30-year circuit. Thomas Eakins immortalized him in 'The Gross Clinic' (1875), one of the greatest American paintings. Jefferson Medical College is among the oldest medical schools in the United States and an independent institutional trunk parallel to the UPenn/Hopkins lineages.", "module": "13_pre_halsted", "source_name": "Jefferson Medical College Department of Surgery", "target_name": "Samuel D. Gross"}, {"source": 270, "target": 269, "edge_type": "governance_leadership", "start_year": 1856, "end_year": 1882, "temporal_range": "1856-1882", "evidence_citation": "PMID: 6996621", "evidence_type": "PMID", "confidence": "high", "notes": "Gross served as professor of surgery at Jefferson from 1856 to 1882, succeeding Thomas Dent Mutter. He was called the 'Emperor of American Surgery' and published 14 books and over 1,200 articles. During this tenure he founded the Philadelphia Academy of Surgery (1879, the oldest continuously meeting surgical society in the US) and the American Surgical Association (1880, already in graph via graph_update_draft.json). He also served as AMA president (1868). His successor was William W. Keen, who became one of the first surgeons to operate on the brain (1889). The dual edges (Jefferson trained Gross; Gross led Jefferson) create a bidirectional circuit rare in the graph and mirror the pattern seen in Cincinnati (where Altemeier returned to lead the department that trained him).", "module": "13_pre_halsted", "source_name": "Samuel D. Gross", "target_name": "Jefferson Medical College Department of Surgery"}, {"source": 270, "target": 259, "edge_type": "society_founder", "start_year": 1880, "end_year": 1884, "temporal_range": "1880-1884", "evidence_citation": "PMID: 28471761", "evidence_type": "PMID", "confidence": "high", "notes": "Gross founded the ASA in 1880 as the first national surgical society in the United States, serving as its first president. Chair of Surgery at Jefferson Medical College, he was the dominant pre-Halstedian figure in American surgery. The ASA subsequently catalyzed the founding of both the ACS (1913) and the ABS (1937).", "module": "13_pre_halsted", "source_name": "Samuel D. Gross", "target_name": "American Surgical Association"}, {"source": 271, "target": 272, "edge_type": "direct_training", "start_year": 1777, "end_year": 1784, "temporal_range": "1777-1784", "evidence_citation": "Hunter_Archive_Cline", "evidence_type": "institutional_archive", "confidence": "moderate", "notes": "Cline trained under Hunter, establishing the early British scientific surgical tradition before the German model dominated.", "module": "14_global_military", "source_name": "John Hunter", "target_name": "Henry Cline"}, {"source": 273, "target": 274, "edge_type": "institutional_founder", "start_year": 1847, "end_year": 1882, "temporal_range": "1847-1882", "evidence_citation": "PMID: 20436531", "evidence_type": "PMID", "confidence": "high", "notes": "Langenbeck developed the German system of residency training at Charit\u00e9, heavily influencing the later Halstedian model.", "module": "14_global_military", "source_name": "Bernhard von Langenbeck", "target_name": "Charit\u00e9 Berlin Department of Surgery"}, {"source": 273, "target": 275, "edge_type": "direct_training", "start_year": 1853, "end_year": 1860, "temporal_range": "1853-1860", "evidence_citation": "PMID: 20436531", "evidence_type": "PMID", "confidence": "high", "notes": "Billroth served as Langenbeck's assistant at Charit\u00e9, internalizing the German academic surgical system before his move to Zurich and Vienna.", "module": "14_global_military", "source_name": "Bernhard von Langenbeck", "target_name": "Theodor Billroth"}, {"source": 275, "target": 276, "edge_type": "institutional_founder", "start_year": 1867, "end_year": 1894, "temporal_range": "1867-1894", "evidence_citation": "PMID: 15354259", "evidence_type": "PMID", "confidence": "high", "notes": "Billroth established the Vienna School of Surgery, pioneering gastrointestinal resections and early modern surgical morbidity tracking.", "module": "14_global_military", "source_name": "Theodor Billroth", "target_name": "Vienna General Hospital Second Surgical Clinic"}, {"source": 275, "target": 0, "edge_type": "observational_study", "start_year": 1878, "end_year": 1880, "temporal_range": "1878-1880", "evidence_citation": "PMID: 2446524", "evidence_type": "PMID", "confidence": "high", "notes": "Halsted spent two years traversing European surgical clinics, highly influenced by Billroth's scientific approach and Langenbeck's residency structure before returning to design the Hopkins system.", "module": "14_global_military", "source_name": "Theodor Billroth", "target_name": "William Stewart Halsted"}, {"source": 22, "target": 277, "edge_type": "institutional_founder", "start_year": 1943, "end_year": 1945, "temporal_range": "1943-1945", "evidence_citation": "MGH_Archive_Churchill_WWII", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Churchill served as Surgical Consultant for the Mediterranean Theater, standardizing whole blood transfusions and delayed primary closure of war wounds, concepts that fundamentally altered civilian trauma care.", "module": "14_global_military", "source_name": "Edward Churchill", "target_name": "Mediterranean Theater Surgical Service"}, {"source": 38, "target": 278, "edge_type": "institutional_founder", "start_year": 1943, "end_year": 1945, "temporal_range": "1943-1945", "evidence_citation": "PMID: 18693427", "evidence_type": "PMID", "confidence": "high", "notes": "Working in the Surgeon General's Office during WWII, DeBakey helped conceptualize the MASH units and the VA medical center system to manage the flow of combat casualties.", "module": "14_global_military", "source_name": "Michael DeBakey", "target_name": "Mobile Army Surgical Hospital (MASH) System"}, {"source": 188, "target": 279, "edge_type": "institutional_founder", "start_year": 1944, "end_year": 1947, "temporal_range": "1944-1947", "evidence_citation": "PMID: 12563656", "evidence_type": "PMID", "confidence": "high", "notes": "Sterling Bunnell (1882-1957), a San Francisco general surgeon, was designated a special civilian consultant to the US Secretary of War at the request of Surgeon General Norman T. Kirk, an orthopedic surgeon. Between November 1944 and February 1947, Bunnell established and visited nine regional hand surgery centers at US Army general hospitals across the United States, organizing surgical treatment protocols and teaching standardized hand injury care. He shut down his private practice for two years to accomplish this. Simultaneously, he completed his seminal textbook 'Surgery of the Hand' (JB Lippincott, 1944), which became the authoritative reference for nearly 30 years. Bunnell's key insight was that hand surgery required a multidisciplinary approach \u2014 correlating orthopedics, plastic surgery, and neurosurgery \u2014 rather than fragmented care by separate specialists. The army hand centers institutionalized this principle. This military-to-civilian specialty creation pattern parallels the trauma lineage (Scudder\u2192ACS COT, already in graph) and the MASH system (already in graph). The surgeons who directed these centers became the founding nucleus of the ASSH.", "module": "14_global_military", "source_name": "Sterling Bunnell", "target_name": "United States Army Hand Surgery Centers"}, {"source": 280, "target": 281, "edge_type": "institutional_founder", "start_year": 1966, "end_year": 2026, "temporal_range": "1966-Present", "evidence_citation": "WRAIR_Archive_Rich", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Rich established the registry to meticulously track combat vascular injuries, driving the definitive transition from arterial ligation to immediate primary repair in modern vascular trauma.", "module": "14_global_military", "source_name": "Norman Rich", "target_name": "Vietnam Vascular Registry"}, {"source": 278, "target": 280, "edge_type": "observational_study", "start_year": 1966, "end_year": 1970, "temporal_range": "1966-1970", "evidence_citation": "WRAIR_Archive_Rich_Vietnam", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Rich utilized the forward surgical concepts pioneered by DeBakey's MASH system to build the Vietnam Vascular Registry.", "module": "14_global_military", "source_name": "Mobile Army Surgical Hospital (MASH) System", "target_name": "Norman Rich"}]}
</script>
<script>
(function() {
  "use strict";

  var graphData = JSON.parse(document.getElementById("graph-data").textContent);

  var EDGE_LABELS = {
    direct_training:           { forward: "Trained",        reverse: "Trained by" },
    institutional_founder:     { forward: "Founded",        reverse: "Founded by" },
    society_founder:           { forward: "Founded",        reverse: "Founded by" },
    governance_leadership:     { forward: "Led / governed", reverse: "Governed by" },
    programmatic_accreditation:{ forward: "Accredits",      reverse: "Accredited by" },
    institutional_succession:  { forward: "Succeeded by",   reverse: "Succeeded" },
    observational_study:       { forward: "Studied under",  reverse: "Influenced" }
  };

  var MODULE_LABELS = {
    "01_halsted_core": "Halsted Core",
    "02_general_surgery_spread": "General Surgery Spread",
    "03_neurosurgery": "Neurosurgery",
    "04_cardiothoracic_vascular": "Cardiothoracic / Vascular",
    "05_urology": "Urology",
    "06_orthopedics": "Orthopedics",
    "07_oncology_trials": "Oncology & Trials",
    "08_subspecialties": "Subspecialties",
    "09_trauma_acute_infection": "Trauma & Acute Care",
    "10_quality_outcomes": "Quality & Outcomes",
    "11_mis_robotic": "MIS & Robotic",
    "12_governance_societies": "Governance & Societies",
    "13_pre_halsted": "Pre-Halsted",
    "14_global_military": "Global & Military"
  };

  var modSel = document.getElementById("moduleFilter");
  Object.keys(MODULE_LABELS).sort().forEach(function(k) {
    var o = document.createElement("option");
    o.value = k; o.textContent = MODULE_LABELS[k];
    modSel.appendChild(o);
  });

  var NODE_COLORS = { person: "#0A5E56", institution: "#B85D3A", society: "#2C2C2C" };
  function edgeColor(t) {
    if (t === "direct_training" || t === "observational_study") return "#0A5E56";
    if (t === "institutional_founder" || t === "society_founder") return "#B85D3A";
    if (t === "governance_leadership") return "#6B6B6B";
    return "#3D8B82";
  }
  function edgeDash(t) {
    if (t === "direct_training" || t === "observational_study") return "";
    if (t === "institutional_founder" || t === "society_founder") return "6,3";
    if (t === "governance_leadership") return "2,3";
    return "8,3,2,3";
  }

  // Build name-to-index lookup
  var nameToIdx = {};
  graphData.nodes.forEach(function(n, i) { nameToIdx[n.id] = i; });

  // Compute degree
  var degree = {};
  graphData.nodes.forEach(function(n, i) { degree[i] = 0; });
  graphData.links.forEach(function(l) {
    degree[l.source] = (degree[l.source] || 0) + 1;
    degree[l.target] = (degree[l.target] || 0) + 1;
  });

  function nodeRadius(i) { return Math.max(4, Math.sqrt(degree[i] || 1) * 3.2); }

  // ── D3 SETUP ──
  var container = document.getElementById("graph-container");
  var W = container.clientWidth, H = container.clientHeight;
  var svg = d3.select("#graph-container").append("svg").attr("width", W).attr("height", H);

  var defs = svg.append("defs");
  ["#0A5E56","#B85D3A","#6B6B6B","#3D8B82"].forEach(function(c) {
    defs.append("marker")
      .attr("id", "arrow-" + c.replace("#",""))
      .attr("viewBox", "0 0 10 6")
      .attr("refX", 10).attr("refY", 3)
      .attr("markerWidth", 8).attr("markerHeight", 6)
      .attr("orient", "auto")
      .append("path").attr("d", "M0,0 L10,3 L0,6 Z").attr("fill", c).attr("opacity", 0.7);
  });

  var gMain = svg.append("g");
  var currentScale = 1;
  function labelThreshold() {
    if (currentScale > 2.5) return 1;
    if (currentScale > 1.5) return 2;
    if (currentScale > 0.8) return 3;
    if (currentScale > 0.4) return 4;
    return 5;
  }
  var zoomBehavior = d3.zoom().scaleExtent([0.05, 6]).on("zoom", function(e) {
    gMain.attr("transform", e.transform);
    var newScale = e.transform.k;
    if (Math.abs(newScale - currentScale) > 0.05) {
      currentScale = newScale;
      if (selectedNode === null) {
        labelText.attr("opacity", function(d, i) {
          if (!isNodeVisible(d)) return 0;
          var q = getVal("searchBox").toLowerCase().trim();
          if (q && d.id.toLowerCase().includes(q)) return 1;
          return (degree[i] || 0) >= labelThreshold() ? 1 : 0;
        });
      }
    }
  });
  svg.call(zoomBehavior);

  // Hit-area lines (invisible wide lines for hover)
  var hitG = gMain.append("g");
  var linkG = gMain.append("g");
  var nodeG = gMain.append("g");
  var labelG = gMain.append("g");

  var link = linkG.selectAll("line")
    .data(graphData.links).join("line")
    .attr("stroke", function(d) { return edgeColor(d.edge_type); })
    .attr("stroke-width", 1.5)
    .attr("stroke-dasharray", function(d) { return edgeDash(d.edge_type); })
    .attr("stroke-opacity", 0.5)
    .attr("marker-end", function(d) { return "url(#arrow-" + edgeColor(d.edge_type).replace("#","") + ")"; });

  var hitLine = hitG.selectAll("line")
    .data(graphData.links).join("line")
    .attr("stroke", "transparent")
    .attr("stroke-width", 12)
    .style("cursor", "pointer");

  var nodeCircle = nodeG.selectAll("circle")
    .data(graphData.nodes).join("circle")
    .attr("r", function(d, i) { return nodeRadius(i); })
    .attr("fill", function(d) { return NODE_COLORS[d.type]; })
    .attr("stroke", "#fff")
    .attr("stroke-width", 1.2)
    .attr("cursor", "pointer");

  var labelText = labelG.selectAll("text")
    .data(graphData.nodes).join("text")
    .text(function(d) { return d.id.length > 30 ? d.id.substring(0,28) + "\u2026" : d.id; })
    .attr("font-size", 9)
    .attr("font-family", "'IBM Plex Sans', sans-serif")
    .attr("fill", "#2C2C2C")
    .attr("text-anchor", "middle")
    .attr("dy", function(d, i) { return -(nodeRadius(i) + 4); })
    .attr("pointer-events", "none")
    .attr("opacity", function(d, i) { return (degree[i] || 0) >= labelThreshold() ? 1 : 0; });

  // ── SIMULATION ──
  var simulation = d3.forceSimulation(graphData.nodes)
    .force("link", d3.forceLink(graphData.links).id(function(d, i) { return i; }).distance(60))
    .force("charge", d3.forceManyBody().strength(-120).distanceMax(500))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("collision", d3.forceCollide().radius(function(d, i) { return nodeRadius(i) + 4; }))
    .force("x", d3.forceX(W / 2).strength(0.04))
    .force("y", d3.forceY(H / 2).strength(0.04))
    .alphaDecay(0.02)
    .on("tick", ticked);

  function getIdx(ref) { return typeof ref === "object" ? ref.index : ref; }

  function ticked() {
    link.attr("x1", function(d) { return d.source.x; })
      .attr("y1", function(d) { return d.source.y; })
      .attr("x2", function(d) {
        var dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        var r = nodeRadius(getIdx(d.target));
        return d.target.x - (dx / dist) * (r + 4);
      })
      .attr("y2", function(d) {
        var dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        var r = nodeRadius(getIdx(d.target));
        return d.target.y - (dy / dist) * (r + 4);
      });
    hitLine.attr("x1", function(d) { return d.source.x; })
      .attr("y1", function(d) { return d.source.y; })
      .attr("x2", function(d) { return d.target.x; })
      .attr("y2", function(d) { return d.target.y; });
    nodeCircle.attr("cx", function(d) { return d.x; }).attr("cy", function(d) { return d.y; });
    labelText.attr("x", function(d) { return d.x; }).attr("y", function(d) { return d.y; });
  }

  // Drag
  nodeCircle.call(d3.drag()
    .on("start", function(e, d) { if (!e.active) simulation.alphaTarget(0.1).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", function(e, d) { d.fx = e.x; d.fy = e.y; })
    .on("end", function(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
  );

  // ── TOOLTIP (nodes) ──
  var tooltip = document.getElementById("tooltip");
  nodeCircle.on("mouseover", function(e, d) {
    tooltip.innerHTML = "<strong>" + escH(d.id) + "</strong><br>" + d.type + " \u00b7 degree " + (degree[d.index] || 0);
    tooltip.style.left = (e.pageX + 12) + "px";
    tooltip.style.top = (e.pageY - 10) + "px";
    tooltip.classList.add("show");
  }).on("mouseout", function() { tooltip.classList.remove("show"); });

  // ── EDGE TOOLTIP with directional labels ──
  var edgeTooltip = document.getElementById("edgeTooltip");
  function showEdgeTip(e, d) {
    var lbl = EDGE_LABELS[d.edge_type] || { forward: d.edge_type };
    var html = '<span class="et-label">' + escH(d.source_name) + '</span> ' + lbl.forward.toLowerCase() + ' <span class="et-label">' + escH(d.target_name) + '</span>';
    if (d.temporal_range) html += "<br>" + escH(d.temporal_range);
    if (d.notes) html += "<br><em>" + escH(d.notes) + "</em>";
    edgeTooltip.innerHTML = html;
    edgeTooltip.style.left = (e.pageX + 12) + "px";
    edgeTooltip.style.top = (e.pageY - 10) + "px";
    edgeTooltip.classList.add("show");
  }
  function moveEdgeTip(e) {
    edgeTooltip.style.left = (e.pageX + 12) + "px";
    edgeTooltip.style.top = (e.pageY - 10) + "px";
  }
  function hideEdgeTip() { edgeTooltip.classList.remove("show"); }
  hitLine.on("mouseover", showEdgeTip).on("mousemove", moveEdgeTip).on("mouseout", hideEdgeTip);
  link.on("mouseover", showEdgeTip).on("mousemove", moveEdgeTip).on("mouseout", hideEdgeTip);

  function escH(s) {
    var d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }

  // ── CLICK → PANEL ──
  var panel = document.getElementById("panel");
  var panelName = document.getElementById("panelName");
  var panelBadge = document.getElementById("panelBadge");
  var panelBody = document.getElementById("panelBody");
  var selectedNode = null;

  function selectNode(idx) {
    var d = graphData.nodes[idx];
    selectedNode = idx;
    panel.classList.remove("hidden");
    panelName.textContent = d.id;
    panelBadge.textContent = d.type;
    panelBadge.className = "badge badge-" + d.type;

    var connections = [];
    graphData.links.forEach(function(l) {
      var si = getIdx(l.source), ti = getIdx(l.target);
      if (si === idx) {
        var lbl = EDGE_LABELS[l.edge_type] || { forward: l.edge_type };
        connections.push({ label: lbl.forward, other: l.target_name, otherIdx: ti, year: l.start_year, temporal: l.temporal_range, notes: l.notes, evidence: l.evidence_citation });
      }
      if (ti === idx) {
        var lbl2 = EDGE_LABELS[l.edge_type] || { reverse: l.edge_type };
        connections.push({ label: lbl2.reverse, other: l.source_name, otherIdx: si, year: l.start_year, temporal: l.temporal_range, notes: l.notes, evidence: l.evidence_citation });
      }
    });

    var grouped = {};
    connections.forEach(function(c) {
      if (!grouped[c.label]) grouped[c.label] = [];
      grouped[c.label].push(c);
    });

    var html = "";
    Object.keys(grouped).sort().forEach(function(label) {
      var items = grouped[label].sort(function(a, b) { return (a.year || 0) - (b.year || 0); });
      html += '<div class="conn-group"><h3>' + escH(label) + '</h3>';
      items.forEach(function(c) {
        html += '<div class="conn-item">';
        html += '<span class="conn-link" data-node="' + c.otherIdx + '">' + escH(c.other) + '</span>';
        if (c.temporal) html += '<div class="conn-meta">' + escH(c.temporal) + '</div>';
        if (c.notes) html += '<div class="conn-notes">' + escH(c.notes) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    });
    if (!html) html = '<p style="color:var(--ds-text-muted);font-size:13px;">No connections with current filters.</p>';
    panelBody.innerHTML = html;
    highlightNode(idx);
  }

  panelBody.addEventListener("click", function(e) {
    var el = e.target.closest("[data-node]");
    if (el) selectNode(parseInt(el.getAttribute("data-node")));
  });

  nodeCircle.on("click", function(e, d) { e.stopPropagation(); selectNode(d.index); });

  document.getElementById("panelClose").addEventListener("click", function() {
    panel.classList.add("hidden");
    selectedNode = null;
    resetHighlight();
  });

  // ── HIGHLIGHT ──
  function highlightNode(idx) {
    var neighbors = new Set([idx]);
    graphData.links.forEach(function(l) {
      var si = getIdx(l.source), ti = getIdx(l.target);
      if (si === idx) neighbors.add(ti);
      if (ti === idx) neighbors.add(si);
    });
    nodeCircle.attr("opacity", function(d) { return neighbors.has(d.index) ? 1 : 0.08; });
    link.attr("stroke-opacity", function(l) {
      var si = getIdx(l.source), ti = getIdx(l.target);
      return (si === idx || ti === idx) ? 0.8 : 0.03;
    });
    labelText.attr("opacity", function(d) { return neighbors.has(d.index) ? 1 : 0; });
  }

  function resetHighlight() {
    nodeCircle.attr("opacity", function(d) { return isNodeVisible(d) ? 1 : 0; });
    link.attr("stroke-opacity", function(d) { return isLinkVisible(d) ? 0.5 : 0; });
    labelText.attr("opacity", function(d, i) { return (isNodeVisible(d) && (degree[i] || 0) >= labelThreshold()) ? 1 : 0; });
  }

  // ── FILTERS ──
  var activeTypes = new Set(["person", "institution", "society"]);

  document.querySelectorAll(".node-toggle").forEach(function(el) {
    el.addEventListener("click", function() {
      var t = el.getAttribute("data-type");
      if (activeTypes.has(t)) { activeTypes.delete(t); el.classList.remove("active"); }
      else { activeTypes.add(t); el.classList.add("active"); }
      applyFilters();
    });
  });

  function getVal(id) { return document.getElementById(id).value; }

  function matchEra(year) {
    var era = getVal("eraFilter");
    if (era === "all") return true;
    if (era === "pre1900") return year < 1900;
    if (era === "1900-1950") return year >= 1900 && year < 1950;
    if (era === "1950-2000") return year >= 1950 && year < 2000;
    return year >= 2000;
  }

  function isLinkVisible(l) {
    var ef = getVal("edgeFilter");
    if (ef !== "all" && l.edge_type !== ef) return false;
    var mf = getVal("moduleFilter");
    if (mf !== "all" && l.module !== mf) return false;
    if (!matchEra(l.start_year)) return false;
    var si = getIdx(l.source), ti = getIdx(l.target);
    if (!activeTypes.has(graphData.nodes[si].type) || !activeTypes.has(graphData.nodes[ti].type)) return false;
    return true;
  }

  function isNodeVisible(d) {
    if (!activeTypes.has(d.type)) return false;
    var q = getVal("searchBox").toLowerCase().trim();
    if (q && !d.id.toLowerCase().includes(q)) return false;
    return true;
  }

  function applyFilters() {
    var q = getVal("searchBox").toLowerCase().trim();
    nodeCircle.attr("opacity", function(d) {
      if (!isNodeVisible(d)) return 0;
      if (q) return d.id.toLowerCase().includes(q) ? 1 : 0.06;
      return 1;
    });
    link.attr("stroke-opacity", function(l) { return isLinkVisible(l) ? 0.5 : 0; });
    hitLine.attr("stroke-opacity", function(l) { return isLinkVisible(l) ? 1 : 0; });
    labelText.attr("opacity", function(d, i) {
      if (!isNodeVisible(d)) return 0;
      if (q && d.id.toLowerCase().includes(q)) return 1;
      if ((degree[i] || 0) >= labelThreshold()) return 1;
      return 0;
    });
    if (selectedNode !== null) highlightNode(selectedNode);
  }

  ["edgeFilter", "eraFilter", "moduleFilter"].forEach(function(id) {
    document.getElementById(id).addEventListener("change", applyFilters);
  });
  document.getElementById("searchBox").addEventListener("input", applyFilters);

  document.getElementById("resetBtn").addEventListener("click", function() {
    activeTypes.clear(); ["person","institution","society"].forEach(function(t) { activeTypes.add(t); });
    document.querySelectorAll(".node-toggle").forEach(function(el) { el.classList.add("active"); });
    document.getElementById("edgeFilter").value = "all";
    document.getElementById("eraFilter").value = "all";
    document.getElementById("moduleFilter").value = "all";
    document.getElementById("searchBox").value = "";
    selectedNode = null;
    panel.classList.add("hidden");
    applyFilters();
    resetHighlight();
  });

  function fitView() {
    var bounds = gMain.node().getBBox();
    if (bounds.width === 0 || bounds.height === 0) return;
    var cW = container.clientWidth, cH = container.clientHeight;
    var scale = 0.85 / Math.max(bounds.width / cW, bounds.height / cH);
    var tx = cW / 2 - scale * (bounds.x + bounds.width / 2);
    var ty = cH / 2 - scale * (bounds.y + bounds.height / 2);
    svg.transition().duration(750).call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }
  document.getElementById("fitBtn").addEventListener("click", fitView);
  simulation.on("end", fitView);
  setTimeout(fitView, 4000);

  svg.on("click", function() {
    if (selectedNode !== null) {
      selectedNode = null;
      panel.classList.add("hidden");
      resetHighlight();
    }
  });
})();
</script>
</body>
</html>
