Professor and Chair of Obstetrics and Gynecology at Hahnemann Medical College, served as the first president of SGO at its founding in January 1969. The society was initiated by John Mikuta and Hervy Averette, who sketched out the concept on cocktail napkins at the Monteleone Hotel in New Orleans. Lewis challenged the founding group to define aims that would justify a new subspecialty. The SGO drove formal subspecialty certification in gynecologic oncology through ABOG in 1974.", "module": "07_oncology_trials", "source_name": "George C. Lewis Jr.", "target_name": "Society of Gynecologic Oncology"}, {"source": 151, "target": 153, "edge_type": "institutional_founder", "start_year": 1970, "end_year": 1985, "temporal_range": "1970-1985", "evidence_citation": "GOG_50th_Anniversary", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Lewis was a key organizer of the GOG, which was founded in 1970 and initially housed within the American College of Obstetricians and Gynecologists. He was elected GOG chair in 1975 and restructured the group from an informal collaboration into a rigorous NCI-funded cooperative group with centralized protocol development. The GOG was the only NCI cooperative group focused exclusively on pelvic malignancies and grew to nearly 200 member institutions.", "module": "07_oncology_trials", "source_name": "George C. Lewis Jr.", "target_name": "Gynecologic Oncology Group"}, {"source": 154, "target": 155, "edge_type": "society_founder", "start_year": 1995, "end_year": 1996, "temporal_range": "1995-1996", "evidence_citation": "ASBrS_Archive_Founders", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Zannis organized the founding of ASBrS to provide a dedicated governance and advocacy platform for surgeons specializing exclusively in breast care.", "module": "07_oncology_trials", "source_name": "Victor Zannis", "target_name": "American Society of Breast Surgeons"}, {"source": 147, "target": 156, "edge_type": "institutional_founder", "start_year": 1998, "end_year": 2011, "temporal_range": "1998-2011", "evidence_citation": "PMID: 10452656", "evidence_type": "PMID", "confidence": "high", "notes": "The ACS founded ACOSOG to specifically evaluate the surgical management of solid tumors through prospective, multi-institutional clinical trials.", "module": "07_oncology_trials", "source_name": "American College of Surgeons", "target_name": "American College of Surgeons Oncology Group"}, {"source": 144, "target": 157, "edge_type": "programmatic_accreditation", "start_year": 1998, "end_year": 2015, "temporal_range": "1998-2015", "evidence_citation": "PMID: 35430661", "evidence_type": "PMID", "confidence": "high", "notes": "Tyler D. '2022 SSO Presidential Address: What is a Surgical Oncologist? Evolution of Surgical Oncology and the Society of Surgical Oncology in an Era of Hyperspecialization.' Ann Surg Oncol. 2022;29(7):4005-13. PMC9013271. Documents the SSO's multi-decade campaign for board certification in surgical oncology: the SSO created the Surgical Oncology Advisory Council (SOAC) with the ABS in 1998, which became the pathway to the ABS Certificate in Complex General Surgical Oncology (CGSO) approved by ABMS in 2011. First board-certified surgical oncologists were certified in 2015. The 1998 SOAC establishment is the discrete founding event \u2014 SSO and ABS formalized their accreditation relationship to create a subspecialty certification pathway. This parallels the FLS\u2192ABS (2009) edge pattern where a society's program becomes mandatory for ABS certification. It also strengthens the SSO node (currently degree 1, only the James Ewing Society succession edge) and connects it to the ABS governance hub.", "module": "07_oncology_trials", "source_name": "Society of Surgical Oncology", "target_name": "American Board of Surgery"}, {"source": 156, "target": 158, "edge_type": "institutional_succession", "start_year": 2011, "end_year": 2026, "temporal_range": "2011-Present", "evidence_citation": "Alliance_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "ACOSOG merged with CALGB and NCCTG to form the Alliance, consolidating surgical and medical oncology trial networks into a unified cooperative group.", "module": "07_oncology_trials", "source_name": "American College of Surgeons Oncology Group", "target_name": "Alliance for Clinical Trials in Oncology"}, {"source": 153, "target": 159, "edge_type": "institutional_succession", "start_year": 2012, "end_year": 2014, "temporal_range": "2012-2014", "evidence_citation": "PMID: 25281376", "evidence_type": "PMID", "confidence": "high", "notes": "In 2012, the GOG merged with the National Surgical Adjuvant Breast and Bowel Project (NSABP, already in graph) and the Radiation Therapy Oncology Group (RTOG) to form NRG Oncology, a new NCTN cooperative group. The acronym NRG derives from the names of the three parental groups. All federal research activities consolidated under NRG Oncology in March 2014. Philip DiSaia (GOG), Norman Wolmark (NSABP), and Walter Curran (RTOG) served as founding co-chairs.", "module": "07_oncology_trials", "source_name": "Gynecologic Oncology Group", "target_name": "NRG Oncology"}, {"source": 150, "target": 159, "edge_type": "institutional_succession", "start_year": 2012, "end_year": 2014, "temporal_range": "2012-2014", "evidence_citation": "PMID: 25281376", "evidence_type": "PMID", "confidence": "high", "notes": "The NSABP, founded by Bernard Fisher (already in graph), merged into NRG Oncology alongside GOG and RTOG. Norman Wolmark, who trained alongside Fisher at the University of Pittsburgh and succeeded him as NSABP chairman, became one of three NRG Oncology principal investigators. This edge connects the existing NSABP/Fisher clinical trials lineage to the gynecologic oncology trunk through the shared NRG Oncology institutional node.", "module": "07_oncology_trials", "source_name": "National Surgical Adjuvant Breast and Bowel Project", "target_name": "NRG Oncology"}, {"source": 150, "target": 158, "edge_type": "programmatic_accreditation", "start_year": 2014, "end_year": 2026, "temporal_range": "2014-Present", "evidence_citation": "NCI_Archive_NCTN", "evidence_type": "institutional_archive", "confidence": "moderate", "notes": "NSABP (now NRG Oncology) and the Alliance operate as parallel NCI-funded cooperative groups within the National Clinical Trials Network, coordinating surgical oncology protocols across the cooperative group structure.", "module": "07_oncology_trials", "source_name": "National Surgical Adjuvant Breast and Bowel Project", "target_name": "Alliance for Clinical Trials in Oncology"}, {"source": 160, "target": 161, "edge_type": "institutional_founder", "start_year": 1820, "end_year": 1875, "temporal_range": "1820-1875", "evidence_citation": "AOS_Archive_Sesquicentennial", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Edward Delafield (1794-1875) and John Kearney Rodgers co-founded the New York Eye Infirmary on August 14, 1820, the first specialty eye hospital in the Western Hemisphere. Both had studied ophthalmology at Moorfields Eye Hospital in London under Astley Cooper and John Abernethy at St. Thomas's and St. Bartholomew's Hospitals (1816-1818). The Infirmary opened at 45 Chatham Square in New York City and performed the first successful congenital cataract surgeries in the United States. Delafield was simultaneously president of the College of Physicians and Surgeons (a precursor institution to Columbia's medical school, though this is not modeled as a formal edge to avoid overstating the institutional link). The Infirmary's seal was later adopted by the American Ophthalmological Society upon its founding in 1864. The institution eventually became the New York Eye and Ear Infirmary (NYEE), which continues today. This is the earliest specialty institution founding in the graph, predating St. Mark's Hospital for Fistula (1835, already in graph) by 15 years and extending the graph's institutional founding timeline into the 1820s.", "module": "08_subspecialties", "source_name": "Edward Delafield", "target_name": "New York Eye Infirmary"}, {"source": 162, "target": 163, "edge_type": "institutional_founder", "start_year": 1835, "end_year": 1859, "temporal_range": "1835-1859", "evidence_citation": "StMarks_Archive_Salmon", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Salmon founded the institution specifically dedicated to colorectal disease, pre-dating modern general surgery departments.", "module": "08_subspecialties", "source_name": "Frederick Salmon", "target_name": "St. Mark's Hospital for Fistula and Other Diseases of the Rectum"}, {"source": 160, "target": 164, "edge_type": "society_founder", "start_year": 1864, "end_year": 1875, "temporal_range": "1864-1875", "evidence_citation": "PMID: 27550008", "evidence_type": "PMID", "confidence": "high", "notes": "The American Ophthalmological Society (AOS) was founded on June 7, 1864, by 18 physicians including Henry Drury Noyes, Daniel Bennett St. John Roosa, and Edward Delafield, who served as its first president. The AOS is the oldest specialty medical society in the United States (the New York Ophthalmological Society, founded March 7, 1864, preceded it by three months but remained a local organization). The AOS was founded at a meeting in Noyes' office at which seven New York City ophthalmologists and one from Boston convened, initially to establish a respectable ophthalmology journal in response to a dubious publication by a German immigrant. They decided a society would be more effective than a journal. Delafield, then age 70 and president of the College of Physicians and Surgeons, was elected chairman. The AOS had only 19 members at its founding. It played a leading role in establishing the American Board of Ophthalmology in 1916. Admission requires nomination by current members and submission of a scholarly thesis. End_year of 1875 reflects Delafield's death.", "module": "08_subspecialties", "source_name": "Edward Delafield", "target_name": "American Ophthalmological Society"}, {"source": 165, "target": 166, "edge_type": "institutional_founder", "start_year": 1899, "end_year": 1910, "temporal_range": "1899-1910", "evidence_citation": "PMID: 10926590", "evidence_type": "PMID", "confidence": "high", "notes": "Mathews was appointed the first Professor of Proctology, establishing the first formal academic department for the specialty in the US.", "module": "08_subspecialties", "source_name": "Joseph McDowell Mathews", "target_name": "Kentucky School of Medicine Department of Proctology"}, {"source": 165, "target": 167, "edge_type": "society_founder", "start_year": 1899, "end_year": 1899, "temporal_range": "1899", "evidence_citation": "PMID: 10926590", "evidence_type": "PMID", "confidence": "high", "notes": "Mathews served as the first president and primary founder of the American Proctologic Society.", "module": "08_subspecialties", "source_name": "Joseph McDowell Mathews", "target_name": "American Proctologic Society"}, {"source": 16, "target": 168, "edge_type": "direct_training", "start_year": 1915, "end_year": 1919, "temporal_range": "1915-1919", "evidence_citation": "Mayo_Archive_Buie", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Buie trained under Mayo before being tasked with organizing a dedicated proctology service.", "module": "08_subspecialties", "source_name": "William J. Mayo", "target_name": "Louis A. Buie"}, {"source": 169, "target": 170, "edge_type": "institutional_founder", "start_year": 1917, "end_year": 1925, "temporal_range": "1917-1925", "evidence_citation": "BAPRAS_Archive_Gillies", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Gillies established the dedicated facial injury ward at Sidcup, effectively centralizing and founding modern plastic surgery.", "module": "08_subspecialties", "source_name": "Harold Gillies", "target_name": "Queen's Hospital Facial Reconstruction Unit"}, {"source": 171, "target": 169, "edge_type": "observational_study", "start_year": 1917, "end_year": 1918, "temporal_range": "1917-1918", "evidence_citation": "PMID: 10359266", "evidence_type": "PMID", "confidence": "high", "notes": "During WWI, Blair served as commander of the U.S. Army corps of head and neck surgeons. He traveled to other parts of Europe where he learned new concepts from Harold Gillies (already in graph) and Sir William Kelsey Fry. This wartime collaboration is the transatlantic bridge between the British plastic surgery trunk (Gillies \u2192 McIndoe, Gillies \u2192 Millard \u2192 Miami) and the American trunk (Blair \u2192 WashU \u2192 ABPS). Both men independently shaped the specialty in their respective countries, but the WWI encounter cross-pollinated techniques.", "module": "08_subspecialties", "source_name": "Vilray Blair", "target_name": "Harold Gillies"}, {"source": 172, "target": 173, "edge_type": "society_founder", "start_year": 1917, "end_year": 1958, "temporal_range": "1917-1958", "evidence_citation": "PMID: 8311630", "evidence_type": "PMID", "confidence": "high", "notes": "Chevalier Quixote Jackson (1865-1958), the 'father of American bronchoesophagoscopy,' founded the American Broncho-Esophagological Association (ABEA) in 1917. Jackson developed the instruments and techniques for safe peroral endoscopy \u2014 laryngoscopy, bronchoscopy, and esophagoscopy \u2014 and trained most of the next generation of endoscopists at clinics in Pittsburgh and Philadelphia. He held the professorship of laryngology at Jefferson Medical College (an existing graph node) from 1916 to 1930, and was additionally Professor of Bronchoesophagology at Jefferson (1924-1930), with parallel appointments at the University of Pennsylvania and Temple University. His 1915 textbook 'Peroral Endoscopy and Laryngeal Surgery' and his 1944 'Diseases of the Air and Food Passages' were definitive works. Jackson's position at Jefferson creates an implicit connection to the existing pre-Halsted Philadelphia trunk (Gross\u2192Jefferson), making Jefferson a multi-specialty convergence node for surgery and ENT. The ABEA continues to meet annually under the auspices of COSM (Combined Otolaryngology Spring Meeting).", "module": "08_subspecialties", "source_name": "Chevalier Jackson", "target_name": "American Broncho-Esophagological Association"}, {"source": 168, "target": 174, "edge_type": "institutional_founder", "start_year": 1924, "end_year": 1952, "temporal_range": "1924-1952", "evidence_citation": "PMID: 12150380", "evidence_type": "PMID", "confidence": "high", "notes": "Buie established the Section of Proctology at the Mayo Clinic, formalizing the institutional subspecialty.", "module": "08_subspecialties", "source_name": "Louis A. Buie", "target_name": "Mayo Clinic Section of Proctology"}, {"source": 175, "target": 176, "edge_type": "society_founder", "start_year": 1924, "end_year": 1933, "temporal_range": "1924-1933", "evidence_citation": "ABOHNS_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The American Board of Otolaryngology (ABOto) was founded and incorporated in 1924, the second specialty certifying board in the United States after the American Board of Ophthalmology (1916). The initiative originated at the 1912 meeting of the Triological Society (formally the American Laryngological, Rhinological, and Otological Society), where Dr. Wishart proposed a standardized period of postgraduate education with certification. The ABOto was co-founded by representatives from the Triological Society, the American Academy of Ophthalmology and Otolaryngology, and the AMA Section on Otolaryngology. ABOto was a founding member of the American Board of Medical Specialties (ABMS) in 1933. The board was renamed the American Board of Otolaryngology-Head and Neck Surgery (ABOHNS) in 2018. This edge follows the established society-to-board spawning pattern documented throughout the graph (AOA\u2192ABOS 1934, ACS/ASA\u2192ABS 1937, Cushing Society\u2192ABNS 1940), but predates all of them \u2014 ABOto is the oldest surgical board. End_year of 1933 reflects the formalization of ABOto's role as a founding ABMS member.", "module": "08_subspecialties", "source_name": "Triological Society", "target_name": "American Board of Otolaryngology-Head and Neck Surgery"}, {"source": 171, "target": 177, "edge_type": "institutional_founder", "start_year": 1925, "end_year": 1955, "temporal_range": "1925-1955", "evidence_citation": "PMID: 10359266", "evidence_type": "PMID", "confidence": "high", "notes": "Blair was the first chief of the Division of Plastic and Reconstructive Surgery at Washington University, serving from 1925 to 1955. St. Louis Medical College MD 1893 (the school merged with WashU in 1891), with further study at St. Bartholomew's Hospital in London. He built one of the largest plastic surgery centers in the country, training James Barrett Brown and Bradford Cannon among others. Blair was a WashU faculty member from 1894 and a contemporary of Evarts Graham (surgery chairman from 1919) \u2014 the two were colleagues in the same department for decades.", "module": "08_subspecialties", "source_name": "Vilray Blair", "target_name": "Washington University Division of Plastic Surgery"}, {"source": 178, "target": 179, "edge_type": "institutional_founder", "start_year": 1927, "end_year": 1945, "temporal_range": "1927-1945", "evidence_citation": "BCH_Archive_Ladd", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Ladd was appointed Surgeon-in-Chief, establishing the first dedicated pediatric surgical service in North America.", "module": "08_subspecialties", "source_name": "William E. Ladd", "target_name": "Boston Children's Hospital Department of Surgery"}, {"source": 169, "target": 180, "edge_type": "direct_training", "start_year": 1930, "end_year": 1932, "temporal_range": "1930-1932", "evidence_citation": "PMID: 21856431", "evidence_type": "PMID", "confidence": "high", "notes": "McIndoe, Gillies' cousin, was directly trained by him before leading the WWII Guinea Pig Club at East Grinstead.", "module": "08_subspecialties", "source_name": "Harold Gillies", "target_name": "Archibald McIndoe"}, {"source": 167, "target": 181, "edge_type": "society_founder", "start_year": 1934, "end_year": 1935, "temporal_range": "1934-1935", "evidence_citation": "PMID: 23997672", "evidence_type": "PMID", "confidence": "high", "notes": "In 1934, representatives of the American Proctologic Society sought approval of the American Board of Proctology from the Council on Medical Education and Hospitals and the Advisory Board for Medical Specialists. The American Board of Proctology was incorporated on August 13, 1935, becoming the sixth board to be organized and the tenth to be incorporated. Renamed to American Board of Colon and Rectal Surgery in 1961. Source: Whitlow CB. The American Board of Colon and Rectal Surgery: Past, Present, and Future. Clin Colon Rectal Surg. 2012;25(3):139-143.", "module": "08_subspecialties", "source_name": "American Proctologic Society", "target_name": "American Board of Colon and Rectal Surgery"}, {"source": 178, "target": 40, "edge_type": "direct_training", "start_year": 1934, "end_year": 1938, "temporal_range": "1934-1938", "evidence_citation": "PMID: 10493481", "evidence_type": "PMID", "confidence": "high", "notes": "Gross served as Ladd's chief resident and eventually succeeded him as Surgeon-in-Chief.", "module": "08_subspecialties", "source_name": "William E. Ladd", "target_name": "Robert E. Gross"}, {"source": 182, "target": 143, "edge_type": "governance_leadership", "start_year": 1934, "end_year": 1957, "temporal_range": "1934-1957", "evidence_citation": "PMID: 2679173", "evidence_type": "PMID", "confidence": "high", "notes": "Hayes Martin (1892-1977), considered the 'father of modern head and neck tumor surgery,' was appointed Chief of the Head and Neck Service at Memorial Hospital for Cancer and Allied Diseases in 1934. He had interned at Memorial in 1922-1923 and returned after training at Bellevue's second surgical service. Martin developed the 'Commando operation' for advanced oral cancers, popularized fine-needle aspiration biopsy for solid tumors (first report in Annals of Surgery), and published the landmark papers 'Cancer of the Head and Neck' (JAMA, 1948) and 'Neck Dissection' (Cancer, 1951). He trained a generation of head and neck surgeons at Memorial, including Edgar Frazell (his successor) and Elliot Strong. Martin retired from active practice in 1957 but continued seeing patients until his death. This edge connects to the existing Memorial Hospital node (degree 3), which also links to Allen O. Whipple (governance_leadership) and the James Ewing Society (institutional_succession), creating a multi-specialty convergence at Memorial spanning general surgery, surgical oncology, and head and neck surgery.", "module": "08_subspecialties", "source_name": "Hayes Martin", "target_name": "Memorial Hospital for Cancer and Allied Diseases"}, {"source": 147, "target": 183, "edge_type": "programmatic_accreditation", "start_year": 1935, "end_year": 2026, "temporal_range": "1935-Present", "evidence_citation": "ACS_Archive_ASCRS", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The ACS established formal governance and accreditation linkages with the ASCRS to standardize colorectal surgical training and board certification.", "module": "08_subspecialties", "source_name": "American College of Surgeons", "target_name": "American Society of Colon and Rectal Surgeons"}, {"source": 171, "target": 184, "edge_type": "society_founder", "start_year": 1937, "end_year": 1941, "temporal_range": "1937-1941", "evidence_citation": "WashU_PlasticSurgery_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "At an AAPS meeting in 1937, Blair laid the foundation for the American Board of Plastic Surgery. The first ABPS meeting was held in 1938. Originally a subsidiary of the American Board of Surgery, the ABPS received independent specialty board status in 1941. Blair championed standardized training over the variable one- or two-year apprenticeship model that had prevailed.", "module": "08_subspecialties", "source_name": "Vilray Blair", "target_name": "American Board of Plastic Surgery"}, {"source": 14, "target": 185, "edge_type": "direct_training", "start_year": 1938, "end_year": 1945, "temporal_range": "1938-1945", "evidence_citation": "UCLA_Archive_Longmire", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Longmire trained under Blalock at Hopkins, served as chief resident, and assisted on the first blue baby operation in 1944.", "module": "08_subspecialties", "source_name": "Alfred Blalock", "target_name": "William Longmire"}, {"source": 26, "target": 186, "edge_type": "direct_training", "start_year": 1945, "end_year": 1953, "temporal_range": "1945-1953", "evidence_citation": "PMID: 6013681", "evidence_type": "PMID", "confidence": "high", "notes": "Mason trained under Wangensteen, carrying the aggressive, physiologically-driven Minnesota surgical culture into his pioneering bariatric work at Iowa.", "module": "08_subspecialties", "source_name": "Owen Wangensteen", "target_name": "Edward Mason"}, {"source": 40, "target": 187, "edge_type": "direct_training", "start_year": 1946, "end_year": 1947, "temporal_range": "1946-1947", "evidence_citation": "PMID: 18412001", "evidence_type": "PMID", "confidence": "high", "notes": "Koop completed a highly concentrated fellowship under Gross before moving to Philadelphia.", "module": "08_subspecialties", "source_name": "Robert E. Gross", "target_name": "C. Everett Koop"}, {"source": 188, "target": 189, "edge_type": "society_founder", "start_year": 1946, "end_year": 1957, "temporal_range": "1946-1957", "evidence_citation": "PMID: 12563656", "evidence_type": "PMID", "confidence": "high", "notes": "On January 20, 1946, Bunnell and 34 hand surgeons \u2014 drawn almost exclusively from the US Army hand centers he had established \u2014 met in Chicago immediately preceding the annual meeting of the American Academy of Orthopaedic Surgeons to found the American Society for Surgery of the Hand (ASSH). Bunnell served as its first president (1946-1947). The 35 founding members included 14 general surgeons, 13 plastic surgeons, and 8 orthopedic surgeons, making the ASSH the only major surgical society to formally span three parent specialties from its inception. The society remained small for its first 25 years (no more than 11 new members admitted in any year), then expanded rapidly starting in 1971. In 1975, the ASSH founded the Journal of Hand Surgery. By 2016, the membership composition had shifted to 78% orthopedic surgeons, 16% plastic surgeons, and 5% general surgeons. The ASSH is the oldest medical specialty society devoted exclusively to the hand. End_year of 1957 reflects Bunnell's death; the society continues to the present.", "module": "08_subspecialties", "source_name": "Sterling Bunnell", "target_name": "American Society for Surgery of the Hand"}, {"source": 187, "target": 190, "edge_type": "institutional_founder", "start_year": 1948, "end_year": 1981, "temporal_range": "1948-1981", "evidence_citation": "PMID: 35001182", "evidence_type": "PMID", "confidence": "high", "notes": "Koop founded the surgical program at CHOP, establishing it as the second major pillar of pediatric surgery.", "module": "08_subspecialties", "source_name": "C. Everett Koop", "target_name": "Children's Hospital of Philadelphia Department of Pediatric Surgery"}, {"source": 169, "target": 191, "edge_type": "direct_training", "start_year": 1948, "end_year": 1949, "temporal_range": "1948-1949", "evidence_citation": "PMID: 11452297", "evidence_type": "PMID", "confidence": "high", "notes": "Millard sought out Gillies in England for specialized training, heavily influencing his later cleft lip innovations.", "module": "08_subspecialties", "source_name": "Harold Gillies", "target_name": "D. Ralph Millard"}, {"source": 185, "target": 124, "edge_type": "institutional_founder", "start_year": 1948, "end_year": 1976, "temporal_range": "1948-1976", "evidence_citation": "UCLA_Archive_Longmire", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Longmire was recruited from Hopkins to become the founding chairman of the UCLA Department of Surgery, building it into a major academic center.", "module": "08_subspecialties", "source_name": "William Longmire", "target_name": "UCLA Department of Surgery"}, {"source": 181, "target": 192, "edge_type": "programmatic_accreditation", "start_year": 1949, "end_year": 2024, "temporal_range": "1949-Present", "evidence_citation": "PMID: 23997672", "evidence_type": "PMID", "confidence": "high", "notes": "The Advisory Board for Medical Specialties (now ABMS) and the Council on Medical Education and Hospitals granted the American Board of Proctology approval as a primary board on June 15, 1949, becoming the eighteenth specialty board approved. ABCRS is currently one of 24 ABMS member boards. Initially certified under the ABS through a Central Certifying Committee in Proctology (1940); gained primary board independence in 1949. In 1980 ABCRS required passage of the ABS qualifying exam, and in 1989 required full ABS certification \u2014 making every board-certified colorectal surgeon also ABS-certified.", "module": "08_subspecialties", "source_name": "American Board of Colon and Rectal Surgery", "target_name": "American Board of Medical Specialties"}, {"source": 193, "target": 194, "edge_type": "institutional_founder", "start_year": 1953, "end_year": 1976, "temporal_range": "1953-1976", "evidence_citation": "DOI: 10.1007/BF02553389", "evidence_type": "DOI", "confidence": "high", "notes": "Rupert Beach Turnbull Jr. (1913-1981) completed surgical training at the Cleveland Clinic under Tom Jones and inherited the colonic and rectal surgery patients after Jones's death. He developed the no-touch isolation technique for colon cancer, pioneered enterostomal therapy, and built the Department of Colon and Rectal Surgery into a world-leading program. Head of department until mandatory retirement in 1976. The Rupert B. Turnbull Surgical Society was founded in 1976 by his former trainees. Source: Corman ML (ed.), Turnbull obituary, Dis Colon Rectum 26(6):416-423, 1983. Written by Victor W. Fazio. PMID not confirmed for this obituary; DOI verified.", "module": "08_subspecialties", "source_name": "Rupert B. Turnbull", "target_name": "Cleveland Clinic Department of Colorectal Surgery"}, {"source": 182, "target": 195, "edge_type": "society_founder", "start_year": 1954, "end_year": 1977, "temporal_range": "1954-1977", "evidence_citation": "PMID: 2679173", "evidence_type": "PMID", "confidence": "high", "notes": "Martin founded the Society of Head and Neck Surgeons (SHNS) in 1954, the first professional society devoted to head and neck cancer surgery. The membership was initially dominated by general surgeons and surgical oncologists. A parallel society, the American Society for Head and Neck Surgery (ASHNS), was established in 1958 by otolaryngologists John Conley and George Sisson. The two societies coexisted \u2014 sometimes with considerable rivalry \u2014 for 44 years before merging in 1998. The SHNS/ASHNS split mirrors the generational society pattern seen elsewhere in the graph (SNS vs. Harvey Cushing Society vs. CNS in neurosurgery; AAST vs. EAST in trauma), though in this case the split was by specialty background (general surgery vs. otolaryngology) rather than seniority. End_year of 1977 reflects Martin's death; the SHNS continued until the 1998 merger.", "module": "08_subspecialties", "source_name": "Hayes Martin", "target_name": "Society of Head and Neck Surgeons"}, {"source": 191, "target": 196, "edge_type": "institutional_founder", "start_year": 1958, "end_year": 1995, "temporal_range": "1958-1995", "evidence_citation": "UMiami_Archive_Millard", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Millard served as the first chief of the division, building it into a premier academic and training center.", "module": "08_subspecialties", "source_name": "D. Ralph Millard", "target_name": "University of Miami Division of Plastic Surgery"}, {"source": 185, "target": 197, "edge_type": "direct_training", "start_year": 1958, "end_year": 1963, "temporal_range": "1958-1963", "evidence_citation": "Fonkalsrud_ASA_Memoir", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Eric William Fonkalsrud (1932-2017) trained as a surgical resident under Longmire at UCLA and was chief resident under him. In 1963 Longmire sent Fonkalsrud to Columbus Children's Hospital for pediatric surgery training, and in 1965 Fonkalsrud returned to UCLA as the sixth member of the Division of General and Cardiac Surgery and one of the earliest full-time pediatric surgeons in a US university medical center. He became founding chief of the Division of Pediatric Surgery at UCLA. The Longmire Surgical Society was founded in 1965 by Longmire's first 15 chief residents including Fonkalsrud. Fonkalsrud's Grand Rounds tribute to Longmire (March 24, 2010) is the primary source documenting their training relationship. ASA memoir (americansurgical.org) confirms his career. This is the first direct_training edge downstream from Longmire, extending the Blalock\u2192Longmire\u2192UCLA chain to a third generation (Blalock\u2192Longmire\u2192Fonkalsrud). CANDIDATE FOR PMID UPGRADE: search for Fonkalsrud obituary or tribute in J Pediatr Surg or Ann Surg 2017-2018.", "module": "08_subspecialties", "source_name": "William Longmire", "target_name": "Eric W. Fonkalsrud"}, {"source": 186, "target": 198, "edge_type": "institutional_founder", "start_year": 1966, "end_year": 1990, "temporal_range": "1966-1990", "evidence_citation": "PMID: 6013681", "evidence_type": "PMID", "confidence": "high", "notes": "Mason established the first dedicated bariatric program, pioneering the gastric bypass and shifting the field away from high-complication intestinal bypasses.", "module": "08_subspecialties", "source_name": "Edward Mason", "target_name": "University of Iowa Bariatric Surgery Program"}, {"source": 199, "target": 200, "edge_type": "institutional_founder", "start_year": 1969, "end_year": 1993, "temporal_range": "1969-1993", "evidence_citation": "PMID: 11469062", "evidence_type": "PMID", "confidence": "high", "notes": "Bismuth established one of the first dedicated hepatobiliary units, pioneering complex liver resections and formalizing the European HPB training model.", "module": "08_subspecialties", "source_name": "Henri Bismuth", "target_name": "Paul Brousse Hospital Hepatobiliary Center"}, {"source": 185, "target": 147, "edge_type": "governance_leadership", "start_year": 1971, "end_year": 1973, "temporal_range": "1971-1973", "evidence_citation": "ACS_Archive_Longmire", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Longmire served as president of the ACS, extending the Blalock/Hopkins lineage into the governance of the primary national surgical society.", "module": "08_subspecialties", "source_name": "William Longmire", "target_name": "American College of Surgeons"}, {"source": 167, "target": 183, "edge_type": "institutional_succession", "start_year": 1973, "end_year": 2026, "temporal_range": "1973-Present", "evidence_citation": "ASCRS_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "The society formally changed its name to reflect the modern scope of the specialty, maintaining unbroken institutional continuity.", "module": "08_subspecialties", "source_name": "American Proctologic Society", "target_name": "American Society of Colon and Rectal Surgeons"}, {"source": 193, "target": 201, "edge_  of Colorectal Surgery"}, {"source": 202, "target": 203, "edge_type": "society_founder", "start_year": 1980, "end_year": 1981, "temporal_range": "1980-1981", "evidence_citation": "AAES_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Thompson served as a primary founding member and early president, formalizing endocrine surgery as a distinct academic subspecialty.", "module": "08_subspecialties", "source_name": "Norman Thompson", "target_name": "American Association of Endocrine Surgeons"}, {"source": 186, "target": 204, "edge_type": "society_founder", "start_year": 1983, "end_year": 1984, "temporal_range": "1983-1984", "evidence_citation": "PMID: 31659590", "evidence_type": "PMID", "confidence": "high", "notes": "Mason organized the founding of the ASBS to establish rigorous clinical standards for the rapidly expanding field of weight-loss surgery.", "module": "08_subspecialties", "source_name": "Edward Mason", "target_name": "American Society for Bariatric Surgery"}, {"source": 205, "target": 206, "edge_type": "institutional_founder", "start_year": 1989, "end_year": 2001, "temporal_range": "1989-2001", "evidence_citation": "MSK_Archive_Blumgart", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Blumgart formally organized the HPB surgical service at MSK, cementing the anatomical approach to biliary and hepatic oncology in the US.", "module": "08_subspecialties", "source_name": "Leslie Blumgart", "target_name": "Memorial Sloan Kettering HPB Service"}, {"source": 205, "target": 71, "edge_type": "governance_leadership", "start_year": 1991, "end_year": 2022, "temporal_range": "1991-2022", "evidence_citation": "PMID: 36320443", "evidence_type": "PMID", "confidence": "high", "notes": "Leslie Harold Blumgart (1931-2022) became Enid A. Haupt Professor of Surgery at Memorial Sloan Kettering Cancer Center in 1991, was appointed Chief and Director of the Programme on Hepato-Biliary Diseases in 1995, and held ication in any surgical discipline. The ABS also subsequently mandated the Fundamentals of Endoscopic Surgery (FES), another SAGES program, for certification. Edge type 'programmatic_accreditation' captures FLS serving as a mandatory credentialing gateway for ABS certification. This edge creates a modern cross-link between the MIS/endoscopic lineage (SAGES, degree 5) and the certification/governance lineage (ABS, degree 4), bridging two previously unconnected clusters.", "module": "10_quality_outcomes", "source_name": "Fundamentals of Laparoscopic Surgery", "target_name": "American Board of Surgery"}, {"source": 242, "target": 243, "edge_type": "society_founder", "start_year": 2010, "end_year": 2026, "temporal_range": "2010-Present", "evidence_citation": "PMID: 28795858", "evidence_type": "PMID", "confidence": "high", "notes": "Ljungqvist co-founded and formalized the ERAS Society, accelerating the global implementation and auditing of enhanced recovery protocols.", "module": "10_quality_outcomes", "source_name": "Olle Ljungqvist", "target_name": "ERAS Society"}, {"source": 236, "target": 243, "edge_type": "institutional_succession", "start_year": 2010, "end_year": 2026, "temporal_range": "2010-Present", "evidence_citation": "PMID: 28795858", "evidence_type": "PMID", "confidence": "high", "notes": "The informal academic study group evolved into a formal global governance body with strict auditing and accreditation protocols.", "module": "10_quality_outcomes", "source_name": "ERAS Study Group", "target_name": "ERAS Society"}, {"source": 239, "target": 244, "edge_type": "institutional_founder", "start_year": 2014, "end_year": 2018, "temporal_range": "2014-2018", "evidence_citation": "PMID: 24317546", "evidence_type": "PMID", "confidence": "high", "notes": "The Fundamentals of Endoscopic Surgery (FES) program was created by SAGES as the flexible endoscopy equivalent of the Fundamentals of Laparoscopic Surgery (FLS) program. FES is a comprehensive educational and assessment tool designed to teach and evaluate the fundamental knowledge, clinical judgment, and technical skills required in the performance of basic gastrointestinal flexible endoscopy. FES uses a virtual reality simulator (GI Bronch Mentor or GI Express) for the manual skills assessment, unlike FLS which uses a physical box trainer. The FES program was developed in collaboration with the ABS, ASCRS, ASMBS, and SSAT. SAGES launched FES publicly in 2014 and it was subsequently mandated by the ABS as part of the ABS Flexible Endoscopy Curriculum. Source: Marks JM et al. Why fundamentals of endoscopic surgery (FES)? Surg Endosc. 2014;28(3):701-703. This edge parallels the SAGES\u2192FLS (2004) edge already in the graph.", "module": "10_quality_outcomes", "source_name": "Society of American Gastrointestinal and Endoscopic Surgeons", "target_name": "Fundamentals of Endoscopic Surgery"}, {"source": 243, "target": 145, "edge_type": "programmatic_accreditation", "start_year": 2015, "end_year": 2026, "temporal_range": "2015-Present", "evidence_citation": "MDA_Archive_ERAS", "evidence_type": "institutional_archive", "confidence": "moderate", "notes": "MD Anderson achieved formal validation for implementing standardized ERAS protocols, particularly bridging oncologic resection with rapid physiological recovery.", "module": "10_quality_outcomes", "source_name": "ERAS Society", "target_name": "MD Anderson Cancer Center"}, {"source": 244, "target": 157, "edge_type": "programmatic_accreditation", "start_year": 2018, "end_year": 2024, "temporal_range": "2018-Present", "evidence_citation": "ABS_FEC_Mandate", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Beginning with the 2017-2018 academic year, the American Board of Surgery required all general surgery certification candidates to have completed the ABS Flexible Endoscopy Curriculum, which includes successful completion of the FES program as its Level V milestone. The ABS Flexible Endoscopy Curriculum was de ", "target_name": "Geriatric Surgery Verification Program"}, {"source": 246, "target": 247, "edge_type": "institutional_founder", "start_year": 1970, "end_year": 2024, "temporal_range": "1970-2024", "evidence_citation": "PMID: 16544065", "evidence_type": "PMID", "confidence": "high", "notes": "Morgenstern L. 'George Berci: past, present, and future.' Surg Endosc. 2006 May;20 Suppl 2:S493-4. Written by Leon Morgenstern, the Chair of Surgery at Cedars-Sinai who recruited Berci in 1967. Documents Berci's 'contributions to the art and science of endoscopy and laparoscopy' over 'nearly half a century.' Berci (1921-2024) was born in Szeged, Hungary, graduated University of Szeged 1950, fled during Hungarian Revolution 1956 on a Rockefeller Fellowship to Melbourne. In Australia he developed the first miniature endoscopic camera (1962). Recruited to Cedars-Sinai 1967 as visiting scholar, became director of the multidisciplinary surgical endoscopy unit ~1970, and remained active until his death at age 103. The program he founded was the first multidisciplinary surgical endoscopy division in the US. Berci goes from degree 1 (SAGES founder) to degree 2. This creates a West Coast institutional anchor for the MIS module \u2014 previously all US MIS nodes were Midwest/South (Ponsky/Cleveland, Reddick/Nashville).", "module": "11_mis_robotic", "source_name": "George Berci", "target_name": "Cedars-Sinai Surgical Endoscopy Program"}, {"source": 246, "target": 239, "edge_type": "society_founder", "start_year": 1981, "end_year": 1981, "temporal_range": "1981", "evidence_citation": "PMID: 24002773", "evidence_type": "PMID", "confidence": "high", "notes": "Berci co-founded SAGES to champion the integration of endoscopy and minimally invasive techniques into general surgery.", "module": "11_mis_robotic", "source_name": "George Berci", "target_name": "Society of American Gastrointestinal and Endoscopic Surgeons"}, {"source": 248, "target": 239, "edge_type": "society_founder", "start_year":
