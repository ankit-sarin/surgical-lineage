<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surgical Lineage Atlas</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
:root {
  --ds-primary: #0A5E56;
  --ds-primary-mid: #3D8B82;
  --ds-primary-light: #DFF0ED;
  --ds-dark: #2C2C2C;
  --ds-accent: #B85D3A;
  --ds-accent-light: #F2E0D6;
  --ds-surface: #DFEBE9;
  --ds-bg: #EEF5F4;
  --ds-text: #2C2C2C;
  --ds-text-muted: #6B6B6B;
  --ds-border: #C5CDD6;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'IBM Plex Sans', Calibri, sans-serif;
  background: var(--ds-bg);
  color: var(--ds-text);
}
#app { display: flex; flex-direction: column; height: 100vh; }
header {
  background: var(--ds-primary);
  color: #fff;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
header .brand h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600;
  font-size: 20px;
  letter-spacing: -0.01em;
}
header .stats {
  display: flex;
  gap: 18px;
  font-family: 'IBM Plex Mono', Consolas, monospace;
  font-size: 12px;
  opacity: 0.85;
}
header .stats .stat-val { font-weight: 600; color: #fff; }
.toolbar {
  background: #fff;
  border-bottom: 1px solid var(--ds-border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  flex-shrink: 0;
  font-size: 13px;
}
.toolbar label { font-weight: 500; color: var(--ds-text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
.toolbar select, .toolbar input[type="text"] {
  border: 1px solid var(--ds-border);
  border-radius: 4px;
  padding: 4px 8px;
  font-family: inherit;
  font-size: 13px;
  background: #fff;
  color: var(--ds-text);
}
.toolbar input[type="text"] { width: 160px; }
.toolbar .sep { width: 1px; height: 24px; background: var(--ds-border); }
.toolbar button {
  background: var(--ds-surface);
  border: 1px solid var(--ds-border);
  border-radius: 4px;
  padding: 4px 12px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  color: var(--ds-text);
}
.toolbar button:hover { background: var(--ds-primary-light); }
.node-toggles { display: flex; gap: 6px; }
.node-toggle {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 4px;
  cursor: pointer; font-size: 12px; font-weight: 500;
  border: 2px solid transparent;
  user-select: none;
}
.node-toggle.active { border-color: currentColor; }
.node-toggle .dot { width: 10px; height: 10px; border-radius: 50%; }
.main { display: flex; flex: 1; overflow: hidden; position: relative; }
#graph-container { flex: 1; position: relative; overflow: hidden; background: var(--ds-bg); }
svg { width: 100%; height: 100%; }
.panel {
  width: 340px;
  background: #fff;
  border-left: 1px solid var(--ds-border);
  overflow-y: auto;
  flex-shrink: 0;
  transition: margin-right 0.25s ease;
  padding: 0;
}
.panel.hidden { margin-right: -340px; }
.panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--ds-border);
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 2;
}
.panel-header h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--ds-dark);
  line-height: 1.3;
  margin-bottom: 6px;
  padding-right: 30px;
}
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.badge-person { background: var(--ds-primary); color: #fff; }
.badge-institution { background: var(--ds-accent); color: #fff; }
.badge-society { background: var(--ds-dark); color: #fff; }
.panel-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--ds-text-muted);
  line-height: 1;
}
.panel-body { padding: 16px; }
.conn-group { margin-bottom: 14px; }
.conn-group h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ds-primary);
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--ds-primary-light);
}
.conn-item {
  padding: 6px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
  line-height: 1.5;
}
.conn-item:last-child { border-bottom: none; }
.conn-link {
  color: var(--ds-primary);
  cursor: pointer;
  text-decoration: none;
  font-weight: 500;
}
.conn-link:hover { text-decoration: underline; }
.conn-meta { font-size: 11px; color: var(--ds-text-muted); margin-top: 2px; }
.conn-notes { font-size: 11px; color: var(--ds-text-muted); font-style: italic; margin-top: 2px; }
.legend {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: rgba(255,255,255,0.95);
  border: 1px solid var(--ds-border);
  border-radius: 6px;
  padding: 12px 16px;
  font-size: 11px;
  z-index: 5;
  max-width: 240px;
}
.legend h4 {
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--ds-dark);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(44,44,44,0.92);
  color: #fff;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 12px;
  z-index: 20;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s;
}
.tooltip.show { opacity: 1; }
.edge-tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(44,44,44,0.95);
  color: #fff;
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 12px;
  z-index: 20;
  max-width: 340px;
  opacity: 0;
  transition: opacity 0.15s;
  line-height: 1.5;
}
.edge-tooltip.show { opacity: 1; }
.edge-tooltip .et-label { font-weight: 600; color: var(--ds-primary-light); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><h1>Surgical Lineage Atlas</h1></div>
    <div class="stats">
      <span><span class="stat-val">321</span> edges</span>
      <span><span class="stat-val">282</span> nodes</span>
      <span><span class="stat-val">137</span> persons</span>
      <span><span class="stat-val">91</span> institutions</span>
      <span><span class="stat-val">54</span> societies</span>
    </div>
  </header>
  <div class="toolbar">
    <div class="node-toggles">
      <div class="node-toggle active" data-type="person" style="color: var(--ds-primary);">
        <span class="dot" style="background: var(--ds-primary);"></span> Person
      </div>
      <div class="node-toggle active" data-type="institution" style="color: var(--ds-accent);">
        <span class="dot" style="background: var(--ds-accent);"></span> Institution
      </div>
      <div class="node-toggle active" data-type="society" style="color: var(--ds-dark);">
        <span class="dot" style="background: var(--ds-dark);"></span> Society
      </div>
    </div>
    <div class="sep"></div>
    <label>Edge</label>
    <select id="edgeFilter">
      <option value="all">All Types</option>
      <option value="direct_training">Training</option>
      <option value="institutional_founder">Inst. Founding</option>
      <option value="society_founder">Society Founding</option>
      <option value="governance_leadership">Governance</option>
      <option value="programmatic_accreditation">Accreditation</option>
      <option value="institutional_succession">Succession</option>
      <option value="observational_study">Observational</option>
    </select>
    <div class="sep"></div>
    <label>Era</label>
    <select id="eraFilter">
      <option value="all">All Eras</option>
      <option value="pre1900">Pre-1900</option>
      <option value="1900-1950">1900-1950</option>
      <option value="1950-2000">1950-2000</option>
      <option value="2000+">2000+</option>
    </select>
    <div class="sep"></div>
    <label>Module</label>
    <select id="moduleFilter">
      <option value="all">All Modules</option>
    </select>
    <div class="sep"></div>
    <input type="text" id="searchBox" placeholder="Search nodes...">
    <div class="sep"></div>
    <button id="resetBtn">Reset</button>
    <button id="fitBtn">Fit View</button>
  </div>
  <div class="main">
    <div id="graph-container">
      <div class="tooltip" id="tooltip"></div>
      <div class="edge-tooltip" id="edgeTooltip"></div>
      <div class="legend">
        <h4>Nodes</h4>
        <div class="legend-item"><span class="legend-dot" style="background:#0A5E56;"></span> Person</div>
        <div class="legend-item"><span class="legend-dot" style="background:#B85D3A;"></span> Institution</div>
        <div class="legend-item"><span class="legend-dot" style="background:#2C2C2C;"></span> Society</div>
        <h4 style="margin-top:10px;">Edges</h4>
        <div class="legend-item"><svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#0A5E56" stroke-width="2"/></svg> Training / Observational</div>
        <div class="legend-item"><svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#B85D3A" stroke-width="2" stroke-dasharray="6,3"/></svg> Founding</div>
        <div class="legend-item"><svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#6B6B6B" stroke-width="2" stroke-dasharray="2,3"/></svg> Governance</div>
        <div class="legend-item"><svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#3D8B82" stroke-width="2" stroke-dasharray="8,3,2,3"/></svg> Accreditation / Succession</div>
      </div>
    </div>
    <div class="panel hidden" id="panel">
      <div class="panel-header">
        <button class="panel-close" id="panelClose">&times;</button>
        <h2 id="panelName"></h2>
        <span class="badge" id="panelBadge"></span>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </div>
  </div>
</div>

iversity and eventually Vanderbilt.", "module": "01_halsted_core", "source_name": "William Stewart Halsted", "target_name": "Barney Brooks"}, {"source": 0, "target": 9, "edge_type": "direct_training", "start_year": 1912, "end_year": 1914, "temporal_range": "1912-1914", "evidence_citation": "UCSF_Archive_Naffziger", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Naffziger served as assistant resident surgeon at Johns Hopkins under Halsted and Cushing, recognizing the superiority of the Halstedian training system before returning to build UCSF.", "module": "01_halsted_core", "source_name": "William Stewart Halsted", "target_name": "Howard Naffziger"}, {"source": 0, "target": 10, "edge_type": "direct_training", "start_year": 1914, "end_year": 1918, "temporal_range": "1914-1918", "evidence_citation": "PMID: 2446524", "evidence_type": "PMID", "confidence": "high", "notes": "Reid served as Halsted's resident and was a key adopter of his meticulous tissue handling techniques.", "module": "01_halsted_core", "source_name": "William Stewart Halsted", "target_name": "Mont Reid"}, {"source": 1, "target": 11, "edge_type": "direct_training", "start_year": 1917, "end_year": 1921, "temporal_range": "1917-1921", "evidence_citation": "JHU_Professorship_Archive", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Warfield M. Firor received his A&S degree from Johns Hopkins in 1917 and his MD in 1921, training in surgery under the Halstedian system. Halsted died in September 1922, making Firor among the last surgeons formed directly within the original Halsted program. Firor became professor of surgery at the School of Medicine and acting surgeon-in-chief of the hospital from 1939 to 1941. He was best known for pioneering work on tetanus toxin and its effect on the spinal cord. He chaired the American Board of Surgery and the Joint Conference Committee on Graduate Training in Surgery. JHU awarded him an honorary doctorate in 1980. He died in 1988 at age 91. An endowed professorship in his name is currently held at Hopkins.", "module": "01_halsted_core", "source_name": "Johns Hopkins Hospital Department of Surgery", "target_name": "Warfield Firor"}, {"source": 0, "target": 12, "edge_type": "direct_training", "start_year": 1919, "end_year": 1923, "temporal_range": "1919-1923", "evidence_citation": "PMID: 4885802", "evidence_type": "PMID", "confidence": "high", "notes": "Holman was Halsted's final chief resident before Halsted's death in 1922.", "module": "01_halsted_core", "source_name": "William Stewart Halsted", "target_name": "Emile Holman"}, {"source": 1, "target": 13, "edge_type": "direct_training", "start_year": 1920, "end_year": 1925, "temporal_range": "1920-1925", "evidence_citation": "Duke_Archive_Hart", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Hart trained at Hopkins under Halsted's system and was recruited to Duke as the founding chairman of surgery.", "module": "01_halsted_core", "source_name": "Johns Hopkins Hospital Department of Surgery", "target_name": "J. Deryl Hart"}, {"source": 1, "target": 14, "edge_type": "direct_training", "start_year": 1922, "end_year": 1925, "temporal_range": "1922-1925", "evidence_citation": "PMID: 31944636", "evidence_type": "PMID", "confidence": "high", "notes": "Blalock trained directly under the Halstedian system at Hopkins before returning as Chief of Surgery to perform the first blue baby operation.", "module": "01_halsted_core", "source_name": "Johns Hopkins Hospital Department of Surgery", "target_name": "Alfred Blalock"}, {"source": 1, "target": 15, "edge_type": "direct_training", "start_year": 1922, "end_year": 1926, "temporal_range": "1922-1926", "evidence_citation": "JHM_Archive_Blakemore", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Blakemore trained at Hopkins before establishing the Columbia vascular lineage, linking early synthetic graft innovation back to Halsted.", "module": "01_halsted_core", "source_name": "Johns Hopkins Hospital Department of Surgery", "target_name": "Arthur Blakemore"}, {"source": 16, "target": 17, "edge_type": "institutional_founder", "start_year": 1889, "end_year": 1939, "temporal_range": "1889-1939", "evidence_citation": "Mayo_Archive_Founder", "evidence_type": "institutional_archive", "confidence": "high", "notes": "William J. Mayo co-founded and built the surgical dynasty at the Mayo Clinic, establishing one of the two primary institutional hubs of early American surgery.", "module": "02_general_surgery_spread", "source_name": "William J. Mayo", "target_name": "Mayo Clinic Department of Surgery"}, {"source": 1, "target": 18, "edge_type": "direct_training", "start_year": 1896, "end_year": 1900, "temporal_range": "1896-1900", "evidence_citation": "PMID: 373268", "evidence_type": "PMID", "confidence": "moderate", "notes": "Joseph Marshall Flint (1872-1944) received his BS from the University of Chicago (1895) and his MD from Johns Hopkins University in 1900 during the Halsted era. He then became professor of anatomy at UC Berkeley (1901-1907) before being appointed the first full-time professor of surgery at Yale Medical School in 1907. At Yale, Flint began a formal surgical residency based on the model developed by Halsted at Hopkins. Confidence moderate because Flint received his Hopkins MD during the Halsted era but was primarily trained as an anatomist rather than as a Halsted surgical resident. His surgical training came later through self-directed study and European sabbatical (1906). Source: Baue AE. Joseph Marshall Flint and the whole-time system at Yale. Yale J Biol Med. 1978;51(5):549-563. BRIDGE EDGE: Connects the Yale 3-node island (Flint + Lindskog + Yale Dept) to the main component via Hopkins.", "module": "02_general_surgery_spread", "source_name": "Johns Hopkins Hospital Department of Surgery", "target_name": "Joseph Marshall Flint"}, {"source": 18, "target": 19, "edge_type": "institutional_founder", "start_year": 1907, "end_year": 1921, "temporal_range": "1907-1921", "evidence_citation": "Yale_Surgery_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Joseph Marshall Flint (1872-1944) became the first full-time Professor of Surgery at Yale in 1907, establishing the academic triad of patient care, education, and research that defines modern surgical departments. Flint received his MD from Johns Hopkins in 1900 (where he would have absorbed the Halstedian culture, though he trained primarily as an anatomist, not as a Halsted surgical resident), then served as professor of anatomy at the University of California (1901-1907). At Yale, he instituted a formal surgical residency based on the Halsted model \u2014 defined curriculum, graded responsibility, specified years \u2014 making Yale one of the earliest institutions outside Hopkins to adopt this training structure. He also pioneered the dog surgery course modeled on Harvey Cushing's approach at Hopkins. During World War I, Flint designed and commanded Mobile Hospital Unit No. 39 (the Yale Unit) in France, receiving the Distinguished Service Medal. He contracted the Spanish Flu during service and never fully recovered. His successor Samuel Clark Harvey (1924-1948) built the residency into a nationally recognized program. This edge creates the Yale Department of Surgery node as a Hopkins-model institutional spread, parallel to the existing edges for Minnesota (Wangensteen), Duke (Hart/Sabiston), and Michigan (Coller).", "module": "02_general_surgery_spread", "source_name": "Joseph Marshall Flint", "target_name": "Yale University Department of Surgery"}, {"source": 5, "target": 20, "edge_type": "direct_training", "start_year": 1914, "end_year": 1920, "temporal_range": "1914-1920", "evidence_citation": "HMS_Archive_Cutler", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Cutler trained under Cushing at Brigham and succeeded him as Moseley Professor of Surgery at Harvard, performing one of the earliest mitral valve operations.", "module": "02_general_surgery_spread", "source_name": "Harvey Cushing", "target_name": "Elliott Cutler"}, {"source": 21, "target": 22, "edge_type": "direct_training", "start_year": 1920, "end_year": 1924, "temporal_range": "1920-1924", "evidence_citation": "PMID: 15523385", "evidence_type": "PMID", "confidence": "high", "notes": "Edward Delos Churchill (1895-1972) graduated from Harvard Medical School cum laude in 1920 and completed his surgical internship and residency at Massachusetts General Hospital under Edward P. Richardson, the John Homans Professor of Surgery and Chief of the West Surgical Service. Churchill continued at MGH as an associate surgeon after residency completion in 1924. He studied in Europe on a Moseley Traveling Fellowship (1926-1927) in Copenhagen, Munich, and Berlin. He returned to MGH in 1927 under Richardson. Richardson sustained an incapacitating stroke in 1930, and Churchill succeeded him as John Homans Professor in 1931. Churchill was NOT trained by Harvey Cushing \u2014 Cushing was at Peter Bent Brigham Hospital, a separate Harvard-affiliated institution. The previous edge incorrectly listed Cushing as Churchill's trainer. Sources: Grillo HC. Edward D. Churchill and the rectangular surgical residency. Surgery. 2004;136(5):947-952. Wright CD. Historical perspectives of the AATS: Edward D. Churchill (1895-1972). J Thorac Cardiovasc Surg. 2012. CORRECTED IN V4: Previously listed as Cushing\u2192Churchill. Richardson was the actual training mentor.", "module": "02_general_surgery_spread", "source_name": "Edward P. Richardson", "target_name": "Edward Churchill"}, {"source": 23, "target": 24, "edge_type": "institutional_founder", "start_year": 1921, "end_year": 1946, "temporal_range": "1921-1946", "evidence_citation": "PMID: 37941365", "evidence_type": "PMID", "confidence": "high", "notes": "Whipple was appointed Professor of Surgery and Director of Surgical Services at Columbia-Presbyterian in 1921 at age 39, serving as chairman for 25 years. He was the first Valentine Mott Professor of Surgery (1931). He built the modern department, expanding residency training, pioneering the pancreaticoduodenectomy (1935), and introducing multidisciplinary teams and prospective data collection. Columbia P&S represents an independent New York surgical trunk \u2014 Whipple was not Halsted-trained.", "module": "02_general_surgery_spread", "source_name": "Allen O. Whipple", "target_name": "Columbia University Department of Surgery"}, {"source": 10, "target": 25, "edge_type": "institutional_founder", "start_year": 1922, "end_year": 1943, "temporal_range": "1922-1943", "evidence_citation": "UC_Archive_Reid", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Reid reorganized the department, formally importing the Halstedian residency model to the Midwest.", "module": "02_general_surgery_spread", "source_name": "Mont Reid", "target_name": "University of Cincinnati Department of Surgery"}, {"source": 17, "target": 26, "edge_type": "direct_training", "start_year": 1924, "end_year": 1927, "temporal_range": "1924-1927", "evidence_citation": "PMID: 17275843", "evidence_type": "PMID", "confidence": "high", "notes": "Wangensteen completed a crucial fellowship at the Mayo Clinic, importing their systematic approach back to Minnesota to build his own dynasty.", "module": "02_general_surgery_spread", "source_name": "Mayo Clinic Department of Surgery", "target_name": "Owen Wangensteen"}, {"source": 12, "target": 27, "edge_type": "institutional_founder", "start_year": 1925, "end_year": 1955, "temporal_range": "1925-1955", "evidence_citation": "Stanford_Archive_Holman", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Holman served as the founding executive of the modern Stanford surgical department.", "module": "02_general_surgery_spread", "source_name": "Emile Holman", "target_name": "Stanford University Department of Surgery"}, {"source": 8, "target": 28, "edge_type": "institutional_founder", "start_year": 1925, "end_year": 1952, "temporal_range": "1925-1952", "evidence_citation": "VUMC_Archive_Brooks", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Brooks established Vanderbilt's surgical residency program modeled entirely on the Hopkins system.", "module": "02_general_surgery_spread", "source_name": "Barney Brooks", "target_name": "Vanderbilt University Department of Surgery"}, {"source": 29, "target": 30, "edge_type": "institutional_founder", "start_year": 1925, "end_year": 1947, "temporal_range": "1925-1947", "evidence_citation": "UChicago_Surgery_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Phemister was the first full-time professor and chairman of surgery at the University of Chicago, serving from 1925 to 1947. Rush Medical College MD 1904 with postgraduate study in Europe \u2014 NOT Halsted-trained. He built the department on the principle that no faculty member should teach unless actively engaged in research. ASA president 1938, ACS president. He recruited Percival Bailey (Cushing trainee, already in graph) to head neurosurgery in 1928 and invited Charles Huggins to join the faculty in 1927. Huggins went on to win the Nobel Prize in 1966 for hormonal cancer therapy.", "module": "02_general_surgery_spread", "source_name": "Dallas Phemister", "target_name": "University of Chicago Department of Surgery"}, {"source": 13, "target": 31, "edge_type": "institutional_founder", "start_year": 1930, "end_year": 1960, "temporal_range": "1930-1960", "evidence_citation": "Duke_Archive_Hart", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Hart was the founding chairman of surgery at Duke, establishing the residency program that Sabiston later transformed into one of the nation's premier surgical training centers.", "module": "02_general_surgery_spread", "source_name": "J. Deryl Hart", "target_name": "Duke University Department of Surgery"}, {"source": 13, "target": 31, "edge_type": "governance_leadership", "start_year": 1930, "end_year": 1960, "temporal_range": "1930-1960", "evidence_citation": "Duke_Archive_Hart", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Hart served as Duke's first surgery chair for 30 years and later as university president, establishing the institutional culture that Sabiston inherited and amplified.", "module": "02_general_surgery_spread", "source_name": "J. Deryl Hart", "target_name": "Duke University Department of Surgery"}, {"source": 32, "target": 33, "edge_type": "institutional_founder", "start_year": 1930, "end_year": 1955, "temporal_range": "1930-1955", "evidence_citation": "Emory_Archive_Elkin", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Elkin was the first official chair of surgery at Emory (1930), the first J.B. Whitehead Professor, and a pioneer in vascular surgery including early aneurysm repair and carotid endarterectomy.", "module": "02_general_surgery_spread", "source_name": "Daniel Elkin", "target_name": "Emory University Department of Surgery"}, {"source": 34, "target": 35, "edge_type": "institutional_founder", "start_year": 1930, "end_year": 1957, "temporal_range": "1930-1957", "evidence_citation": "ACS_Coller_Archive", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Coller arrived at Michigan in 1920 from Harvard and was appointed Chairman of Surgery in 1930, serving for 27 years until 1957. Harvard-trained \u2014 NOT Halsted-connected. He restructured the American surgical residency format, conducted landmark research on water balance and electrolytes, and trained over 200 surgeons who became professors and chiefs nationally. ASA president 1943, ACS president 1949, first Chairman of the ABS Residency Review Committee for Surgery in 1954.", "module": "02_general_surgery_spread", "source_name": "Frederick Coller", "target_name": "University of Michigan Department of Surgery"}, {"source": 22, "target": 36, "edge_type": "governance_leadership", "start_year": 1931, "end_year": 1962, "temporal_range": "1931-1962", "evidence_citation": "PMID: 32808916", "evidence_type": "PMID", "confidence": "high", "notes": "Edward Delos Churchill (1895-1972) succeeded Edward P. Richardson as the John Homans Professor of Surgery at Harvard Medical School and Chief of the West Surgical Service at MGH in 1931, after Richardson suffered an incapacitating stroke. In 1948 he was additionally appointed Chief of the General Surgical Service. Churchill held these positions until receiving emeritus status in 1962 \u2014 a 31-year tenure. Churchill redesigned the MGH surgical residency in 1938, replacing the Halstedian pyramidal model with a 'rectangular' program that finished the same number of residents it accepted. This innovation \u2014 training all accepted residents to completion rather than eliminating them competitively \u2014 became the template for all modern US surgical training programs. Churchill trained at Harvard Medical School (not Hopkins) and completed his surgical residency at MGH under Edward P. Richardson (1920-1924). He was NOT trained by Harvey Cushing, who was at the separate Peter Bent Brigham Hospital. Corrected in V4.. His MGH department node creates the institutional terminus for the Halsted\u2192Cushing\u2192Churchill chain, extending the Halstedian invasion pattern to Boston. Churchill also trained John H. Gibbon Jr. (inventor of the heart-lung machine) in his lab, though Gibbon is not yet in the graph.", "module": "02_general_surgery_spread", "source_name": "Edward Churchill", "target_name": "Massachusetts General Hospital Department of Surgery"}, {"source": 37, "target": 38, "edge_type": "direct_training", "start_year": 1932, "end_year": 1937, "temporal_range": "1932-1937", "evidence_citation": "PMID: 18693427", "evidence_type": "PMID", "confidence": "high", "notes": "DeBakey more trained Voorhees in the synthetic graft innovation) into the Columbia department. This edge formally connects the Halstedian trunk to the independent Columbia trunk via a shared institutional node.", "module": "02_general_surgery_spread", "source_name": "Arthur Blakemore", "target_name": "Columbia University Department of Surgery"}, {"source": 44, "target": 45, "edge_type": "governance_leadership", "start_year": 1941, "end_year": 1950, "temporal_range": "1941-1950", "evidence_citation": "PMID: 16632995", "evidence_type": "PMID", "confidence": "high", "notes": "In October 1941, Drew was appointed Chairman of the Department of Surgery at Howard University College of Medicine and Chief of Surgery at Freedmen's Hospital (Howard's main teaching facility). That same month, he became the first African American appointed as an examiner for the American Board of Surgery. Drew's mission at Howard was to train a generation of elite Black surgeons who would meet the most rigorous national standards and then place them in strategic positions throughout the country. He created a rigorous residency program modeled on the standards he absorbed at Columbia under Whipple. Drew held the chairmanship until his death on April 1, 1950, from injuries sustained in an automobile accident near Burlington, North Carolina, while en route to a surgical conference at Tuskegee. His last lecture \u2014 to the sophomore class on Shock, Plasma, and Water Balance \u2014 was delivered on March 31, 1950. Sitting in the front row of that lecture was 19-year-old LaSalle D. Leffall Jr., who would graduate first in his class in 1952 and ultimately succeed Drew's legacy at Howard.", "module": "02_general_surgery_spread", "source_name": "Charles R. Drew", "target_name": "Howard University Department of Surgery"}, {"source": 37, "target": 46, "edge_type": "institutional_founder", "start_year": 1942, "end_year": 1956, "temporal_range": "1942-1956", "evidence_citation": "Ochsner_Archive_Founder", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Ochsner co-founded the Ochsner Clinic in New Orleans, establishing a major multi-specialty surgical center and training hub in the Gulf South.", "module": "02_general_surgery_spread", "source_name": "Alton Ochsner", "target_name": "Ochsner Clinic"}, {"source": 1, "target": 47, "edge_type": "direct_training", "start_year": 1943, "end_year": 1947, "temporal_range": "1943-1947", "evidence_citation": "NLM_Archive_Harkins", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Harkins served as Associate Professor of Surgery at Johns Hopkins from 1943-1947 before being recruited to found the UW Department of Surgery.", "module": "02_general_surgery_spread", "source_name": "Johns Hopkins Hospital Department of Surgery", "target_name": "Henry Harkins"}, {"source": 14, "target": 48, "edge_type": "direct_training", "start_year": 1944, "end_year": 1950, "temporal_range": "1944-1950", "evidence_citation": "PMID: 19685166", "evidence_type": "PMID", "confidence": "high", "notes": "Cooley assisted Blalock during the first tetralogy of Fallot operations at Hopkins.", "module": "02_general_surgery_spread", "source_name": "Alfred Blalock", "target_name": "Denton Cooley"}, {"source": 49, "target": 50, "edge_type": "institutional_founder", "start_year": 1945, "end_year": 1960, "temporal_range": "1945-1960", "evidence_citation": "Rhoads_Surgery_2000", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Ravdin served as the John Rhea Barton Professor and Chairman of Surgery at the University of Pennsylvania from 1945 to 1960, then became VP for Medical Affairs. Penn MD 1918, trained entirely at Penn \u2014 NOT Halsted-connected. ASA president 1958, ACS president 1960-1961. He operated on President Eisenhower for Crohn's disease in 1956 and chaired the NIH Clinical Studies Panel that catalyzed the NSABP (already in graph). His mentee Bernard Fisher (already in graph as NSABP founder ng", "start_year": 1947, "end_year": 1952, "temporal_range": "1947-1952", "evidence_citation": "PMID: 22248679", "evidence_type": "PMID", "confidence": "high", "notes": "Sabiston completed his surgical residency and chief residency under Blalock at Hopkins, becoming one of the most influential surgical educators of the 20th century.", "module": "02_general_surgery_spread", "source_name": "Alfred Blalock", "target_name": "David Sabiston"}, {"source": 47, "target": 58, "edge_type": "institutional_founder", "start_year": 1947, "end_year": 1967, "temporal_range": "1947-1967", "evidence_citation": "NLM_Archive_Harkins", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Harkins was the first chairman of surgery at the University of Washington, establishing the residency program and developing the department from the founding of the medical school in 1946.", "module": "02_general_surgery_spread", "source_name": "Henry Harkins", "target_name": "University of Washington Department of Surgery"}, {"source": 45, "target": 51, "edge_type": "direct_training", "start_year": 1948, "end_year": 1957, "temporal_range": "1948-1957", "evidence_citation": "PMID: 18481473", "evidence_type": "PMID", "confidence": "high", "notes": "LaSalle Doheny Leffall Jr. (1930-2019) entered Howard University College of Medicine in 1948 at age 18 and graduated first in his class in 1952. His mentors included Charles R. Drew, Burke Syphax (Drew's successor as surgery program director), W. Montague Cobb (professor of anatomy), and Jack White (who would direct Leffall toward surgical oncology training). Leffall completed his internship at Homer G. Phillips Hospital in St. Louis (1952-1953), then returned to the Howard system for surgical residency: assistant resident at D.C. General Hospital and Freedmen's Hospital (1953-1956), followed by chief residency at Freedmen's Hospital (1956-1957). The start_year of 1948 reflects medical school entry; the end_year of 1957 reflects completion of the chief residency. This training period spans the Drew era (Drew died during Leffall's second year of medical school) and its immediate succession under Syphax and White.", "module": "02_general_surgery_spread", "source_name": "Howard University Department of Surgery", "target_name": "LaSalle D. Leffall Jr."}, {"source": 59, "target": 19, "edge_type": "governance_leadership", "start_year": 1948, "end_year": 1966, "temporal_range": "1948-1966", "evidence_citation": "Yale_Surgery_Archive_Lindskog", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Gustaf E. Lindskog (1903-2002) served as the William Carmalt Professor of Surgery and Chairman of the Department of Surgery at Yale from 1948 to 1966, simultaneously serving as surgeon-in-chief of Grace-New Haven Community Hospital (later Yale-New Haven Hospital). Lindskog graduated from Harvard Medical School (1928), interned at Lakeside Hospital in Cleveland, completed surgical residency at Yale (1929-1932), and was a National Research Council Fellow at Massachusetts General Hospital (1932-1933) before returning to Yale permanently. In 1942, as an assistant professor of surgery, Lindskog administered the first intravenous chemotherapy to a human cancer patient \u2014 a 47-year-old man with lymphosarcoma (known only as 'J.D.') \u2014 using nitrogen mustard developed by pharmacologists Louis Goodman and Alfred Gilman under a secret wartime chemical warfare research program. This event, kept classified until after the war, launched the era of cancer chemotherapy. Lindskog also recruited William Glenn, who developed the Glenn shunt for congenital heart disease and the first working model of an artificial heart. Lindskog was a member of the American Surgical Association, AATS, and a Fellow of the ACS. He died at age 99. This edge extends Yale's surgical lineage from the founding era (Flint) through the mid-century golden age of thoracic and oncologic surgery.", "module": "02_general_surgery_spread", "source_name": "Gustaf Lindskog", "target_name": "Yale University Department of Surgery"}, {"source": 60, "target": 61, "edge_type": "governance_leadership", "start_year": 1948, "end_year": 1976, "temporal_range": "1948-1976", "evidence_citation": "PMID: 11930218", "evidence_type": "PMID", "confidence": "high", "notes": "Souba WW, Wilmore DW. 'Francis Daniels Moore, 1913-2001.' Ann Surg. 2002 Apr;235(4):453-7. PMC1422478. Documents Moore (1913-2001) as Surgeon-in-Chief at Peter Bent Brigham Hospital and Moseley Professor of Surgery at Harvard Medical School from 1948 to 1976. At age 34, he was the youngest surgery chief in Harvard's history. Under Moore's leadership, the department pioneered organ transplantation (Murray), open-heart surgery, and the metabolic care of the surgical patient. Moore trained at MGH (Harvard surgical residency) but spent his entire chairmanship at Brigham. His book 'The Metabolic Care of the Surgical Patient' (1959) was the standard text for decades. Moore was a member of the 1954 transplant surgical team. This edge creates the institutional governance context for Murray's transplant work \u2014 Moore provided the academic environment and institutional protection that enabled a decade of experimental transplant attempts before the 1954 success. The Brigham Department of Surgery node is new and distinct from the two existing Brigham subspecialty nodes (neurosurgery/Cushing, vascular/Homans).", "module": "02_general_surgery_spread", "source_name": "Francis D. Moore", "target_name": "Peter Bent Brigham Hospital Department of Surgery"}, {"source": 38, "target": 48, "edge_type": "direct_training", "start_year": 1951, "end_year": 1954, "temporal_range": "1951-1954", "evidence_citation": "PMID: 19685166", "evidence_type": "PMID", "confidence": "high", "notes": "Cooley joined DeBakey at Baylor after completing his Hopkins training, before the famous professional split that led to the founding of the Texas Heart Institute.", "module": "02_general_surgery_spread", "source_name": "Michael DeBakey", "target_name": "Denton Cooley"}, {"source": 61, "target": 62, "edge_type": "institutional_succession", "start_year": 1951, "end_year": 1971, "temporal_range": "1951-1971", "evidence_citation": "PMID: 34645295", "evidence_type": "PMID", "confidence": "high", "notes": "The renal transplant program at the Peter Bent Brigham Hospital was established within Francis D. Moore's Department of Surgery. Moore (surgeon-in-chief 1948-1976) committed departmental resources to Joseph Murray's transplant research, which Murray himself described as essential: 'He highlighted the benefit he derived from Dr Moore, who provided a departmental environment that was enriching and conducive to scientific investigation' (Delmonico, Am J Transplant 2002). Murray returned to Brigham in 1951 after military service and plastic surgery training in New York, and performed the first successful kidney transplant in 1954 under Moore's departmental leadership. Murray served as chief of transplant surgery within the department from 1951 to 1971. The Brigham team \u2014 Moore (surgery), Thorn (medicine), Murray (transplant surgery), Merrill (nephrology), Harrison (urology) \u2014 functioned as an interdisciplinary unit within the department. Source: Niumsawatt V et al. Joseph Murray: Pioneering Plastic Surgeon and Father of the First Organ Transplant. Ann Plast Surg. 2021;87(5):e74-e80. BRIDGE EDGE: Connects the Moore/Brigham Dept 2-node island to the main component via the Brigham Transplant Program (which links to Murray, already in the main component).", "module": "02_general_surgery_spread", "source_name": "Peter Bent Brigham Hospital Department of Surgery", "target_name": "Peter Bent Brigham Hospital Renal Transplant Program"}, {"source": 1, "target": 63, "edge_type": "direct_training", "start_year": 1952, "end_year": 1956, "temporal_range": "1952-1956", "evidence_citation": "PMID: 23225838", "evidence_type": "PMID", "confidence": "high", "notes": "Starzl completed his surgical residency at Hopkins, bridging the classical general surgery trunk to the genesis of liver transplantation.", "module": "02_general_surgery_spread", "source_name": "Johns Hopkins Hospital Department of Surgery", "target_name": "Thomas Starzl"}, {"source": 54, "target": 64, "edge_type": "institutional_founder", "start_year": 1952, "end_year": 1960, "temporal_range": "1952-1960", "evidence_citation": "PMID: 17275843", "evidence_type": "PMID", "confidence": "high", "notes": "Lewis led the team that performed the world's first successful open-heart surgery using hypothermia in 1952, establishing Minnesota as the birthplace of cardiac surgery.", "module": "02_general_surgery_spread", "source_name": "F. John Lewis", "target_name": "University of Minnesota Open Heart Surgery Program"}, {"source": 1, "target": 65, "edge_type": "direct_training", "start_year": 1954, "end_year": 1955, "temporal_range": "1954-1955", "evidence_citation": "PMID: 11153604", "evidence_type": "PMID", "confidence": "moderate", "notes": "Safar completed anesthesiology training and clinical work at Hopkins, connecting the genesis of modern critical care to the Halstedian root.", "module": "02_general_surgery_spread", "source_name": "Johns Hopkins Hospital Department of Surgery", "target_name": "Peter Safar"}, {"source": 66, "target": 62, "edge_type": "institutional_founder", "start_year": 1954, "end_year": 1971, "temporal_range": "1954-1971", "evidence_citation": "PMID: 15631913", "evidence_type": "PMID", "confidence": "high", "notes": "Murray JE. 'The first successful organ transplants in man.' J Am Coll Surg. 2005 Jan;200(1):5-9. Murray's own first-person account. On December 23, 1954, Murray performed the world's first successful human organ transplant \u2014 a kidney between identical twins Richard and Ronald Herrick \u2014 at Peter Bent Brigham Hospital, Operating Room 2. In 1959, he performed the first transplant between non-identical twins. In 1962, he performed the first successful kidney transplant from an unrelated cadaver donor using azathioprine immunosuppression (developed with Elion and Hitchings). Murray directed the Brigham transplant program until stepping down in 1971 to return to plastic surgery at Children's Hospital. He was awarded the Nobel Prize in Physiology or Medicine in 1990. The Brigham transplant program is the single most important missing institutional node in the graph \u2014 it is the origin of all organ transplantation. It represents a parallel origin trunk to Starzl (liver, Pittsburgh) and Shumway (heart, Stanford), both already in the graph. The Peter Bent Brigham Hospital later became Brigham and Women's Hospital (1980).", "module": "02_general_surgery_spread", "source_name": "Joseph E. Murray", "target_name": "Peter Bent Brigham Hospital Renal Transplant Program"}, {"source": 52, "target": 67, "edge_type": "direct_training", "start_year": 1956, "end_year": 1958, "temporal_range": "1956-1958", "evidence_citation": "PMID: 11845877", "evidence_type": "PMID", "confidence": "high", "notes": "Barnard trained at Minnesota, heavily mentored by Lillehei in advanced cardiothoracic techniques before returning to Cape Town.", "module": "02_general_surgery_spread", "source_name": "C. Walton Lillehei", "target_name": "Christiaan Barnard"}, {"source": 26, "target": 68, "edge_type": "direct_training", "start_year": 1956, "end_year": 1963, "temporal_range": "1956-1963", "evidence_citation": "PMID: 2774706", "evidence_type": "PMID", "confidence": "high", "notes": "Najarian trained under Wangensteen and succeeded him as chairman of the University of Minnesota Department of Surgery, continuing the transplant dynasty.", "module": "02_general_surgery_spread", "source_name": "Owen Wangensteen", "target_name": "John Najarian"}, {"source": 69, "target": 70, "edge_type": "direct_training", "start_year": 1956, "end_year": 1963, "temporal_range": "1956-1963", "evidence_citation": "PMID: 17473177", "evidence_type": "PMID", "confidence": "high", "notes": "Prinz RA, Thistlethwaite JR. 'Olga Jonasson, MD: Surgeon, Mentor, Teacher, Friend.' Arch Surg. 2007 May;142(5):490-492. PMC1856623. Documents that Jonasson 'studied under Warren Cole, MD, FACS, at the University of Illinois College of Medicine' for her surgical residency. When she told Cole she wanted to become a surgeon, 'even though a woman, he thought the idea totally absurd' \u2014 but ultimately accepted her. She was elected to AOA during medical school and began teaching surgery at U of I in 1963 after residency. Warren Cole (1898-1990) was chair of surgery at U of I (1930-1967) and pioneer of oral cholecystography. This is the first direct_training edge involving a woman in the entire graph \u2014 it connects Jonasson's governance-only subgraph to the training lineage backbone.", "module": "02_general_surgery_spread", "source_name": "Warren Cole", "target_name": "Olga Jonasson"}, {"source": 71, "target": 51, "edge_type": "direct_training", "start_year": 1957, "end_year": 1959, "temporal_range": "1957-1959", "evidence_citation": "PMID: 18481473", "evidence_type": "PMID", "confidence": "high", "notes": "Leffall completed a senior fellowship in surgical oncology at Memorial Sloan Kettering Cancer Center (1957-1959), the first African American to hold such a fellowship there. He was directed toward MSK by his mentor Jack White at Howard. Leffall specialized in colon and rectal, breast, and head and neck cancers. This edge connects the Howard/Drew lineage to the existing Memorial Sloan Kettering node (already connected to the James Ewing Society and the Memorial Hospital for Cancer and Allied Diseases in the graph). The MSK fellowship bridges the independent Howard training trunk into the established oncology cluster, creating a cross-lineage pathway analogous to how Patrick Walsh's UCLA-to-Hopkins recruitment bridges the urology trunk.", "module": "02_general_surgery_spread", "source_name": "Memorial Sloan Kettering Cancer Cen d founding president/CEO of the Massachusetts General Physicians Organization. Austen was president of the AAS, SUS, ASA, AHA, AATS, and ACS (1992-1993). His 29-year tenure as MGH chief parallels Leffall's 25-year chairmanship at Howard (Priority 1) and represents one of the longest departmental leaderships in the graph.", "module": "02_general_surgery_spread", "source_name": "W. Gerald Austen", "target_name": "Massachusetts General Hospital Department of Surgery"}, {"source": 51, "target": 45, "edge_type": "governance_leadership", "start_year": 1970, "end_year": 1995, "temporal_range": "1970-1995", "evidence_citation": "PMID: 18481473", "evidence_type": "PMID", "confidence": "high", "notes": "Leffall joined the Howard faculty in 1962 as assistant professor of surgery and was appointed Chairman of the Department of Surgery in 1970, a position he held for 25 years until 1995. In 1992, he was named the first Charles R. Drew Professor of Surgery \u2014 the first endowed chair in the history of Howard's Department of Surgery. During his tenure, Leffall taught approximately 6,000 medical students and trained over 300 general surgery residents. He also served as principal civilian consultant to the General Surgery Service at Walter Reed Army Medical Center for 30 years (1970-2000). The dual edges (Howard trained Leffall; Leffall led Howard) create a bidirectional circuit paralleling the pattern seen with Samuel D. Gross at Jefferson (trained by Jefferson, later led Jefferson) and William Altemeier at Cincinnati \u2014 both already documented in the graph. This circuit is the signature of a surgeon who returns to transform the institution that formed him.", "module": "02_general_surgery_spread", "source_name": "LaSalle D. Leffall Jr.", "target_name": "Howard University Department of Surgery"}, {"source": 63, "target": 79, "edge_type": "society_founder", "start_year": 1974, "end_year": 1975, "temporal_range": "1974-1975", "evidence_citation": "PMID: 10457723", "evidence_typ also a first for women. At Ohio State she championed resident well-being and humanitarian care. She served as ACS Regent (1976, already in graph) and ABS board member. Jonasson's degree goes from 2 to 4, transforming her from a leaf into a hub connecting training (Cole), governance (ACS, ABS), and institutional leadership (Ohio State).", "module": "02_general_surgery_spread", "source_name": "Olga Jonasson", "target_name": "Ohio State University Department of Surgery"}, {"source": 85, "target": 58, "edge_type": "governance_leadership", "start_year": 1993, "end_year": 2018, "temporal_range": "1993-2018", "evidence_citation": "UW_Surgery_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Carlos Alberto Pellegrini (b. 1944, Argentina) became the Henry N. Harkins Professor and Chair of the Department of Surgery at the University of Washington in January 1993, succeeding C. James Carrico (interim chairs Ashbaugh and Clowes). He served until retirement in 2018 (25 years). MD from University of Rosario (Argentina) 1971, surgical residency at University of Chicago, faculty at UCSF 1979-1993. At UW he created the Center for Videoendoscopic Surgery, the Center for Gastric and Esophageal Surgery, and the WWAMI Institute for Simulation in Healthcare (WISH, 2005). Pioneer in minimally invasive gastrointestinal surgery. Also served as founding Chief Medical Officer of UW Medicine. This edge extends the UW succession chain: Harkins (1947-1967) \u2192 Merendino (1964-1972) \u2192 [Stevenson, Shires, Carrico] \u2192 Pellegrini (1993-2018). Also served as ASA president (2005) and ACS president (94th, 2013). CANDIDATE FOR PMID UPGRADE: search for Pellegrini ASA presidential address in Ann Surg 2005-2006.", "module": "02_general_surgery_spread", "source_name": "Carlos A. Pellegrini", "target_name": "University of Washington Department of Surgery"}, {"source": 86, "target": 1, "edge_type": "governance_leadership", "start_year": 2003, "end_year": 2014, "temporal_range": "2003-2014", "evidence_citation": "PMID: 19099052", "evidence_type": "PMID", "confidence": "high", "notes": "Julie Ann Freischlag (b. 1954) became the William Stewart Halsted Professor, Director of the Department of Surgery, and Surgeon-in-Chief at The Johns Hopkins Hospital in March 2003, succeeding John L. Cameron. She was the first woman and only the seventh person to hold these posts (after Halsted, Finney, Blalock, Zuidema, Cameron, and herself \u2014 the sixth director, not the sixth person, as some sources vary on the count of acting chiefs). Rush Medical College MD 1980, general surgery residency and vascular fellowship at UCLA. Previously chief of vascular surgery at UCLA (1998-2003). At Hopkins, she created the Center for Surgical Trials and Outcomes Research (CSTOR), improved patient safety systems, and advanced faculty diversity. She also served as editor of JAMA Surgery (2005-2014). Left Hopkins in 2014 to become vice chancellor at UC Davis, then CEO of Wake Forest Baptist Medical Center (2017). Elected to the National Academy of Medicine 2015. ACS Board of Regents Chair 2012, ACS President 2018-2019. Society for Vascular Surgery president (first woman). Source: Freischlag JA. Women surgeons \u2014 still in a male-dominated world. Yale J Biol Med. 2008;81(4):203-204. Written from her Hopkins Halsted Professorship. Ghost node 'Julie Freischlag' mentioned in notes fields of Patricia Numann edges now converted to real person node.", "module": "02_general_surgery_spread", "source_name": "Julie Ann Freischlag", "target_name": "Johns Hopkins Hospital Department of Surgery"}, {"source": 82, "target": 31, "edge_type": "governance_leadership", "start_year": 2014, "end_year": 2025, "temporal_range": "2014-2025", "evidence_citation": "Duke_Archive_Kirk", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Kirk served as chair and inaugural Surgeon-in-Chief for Duke University Health System, a transplant immunologist extending the Halsted-Blalock-Sabiston lineage into active transplant science.", "module": "02_general_surgery_spread", "source_name": "Allan Kirk", "target_name": "Duke University Department of Surgery"}, {"source": 5, "target": 87, "edge_type": "direct_training", "start_year": 1908, "end_year": 1912, "temporal_range": "1908-1912", "evidence_citation": "PMID: 19522575", "evidence_type": "PMID", "confidence": "high", "notes": "Semmes received his medical degree from Johns Hopkins in 1910, where he trained under Cushing. Semmes was a classmate of Walter Dandy (already in graph). He returned to Memphis in 1912 to become the city's first neurosurgeon and first Professor of Neurosurgery at the University of Tennessee (1932). He co-founded the Semmes-Murphey Clinic, which became the training ground for the next generation of Southern neurosurgeons.", "module": "03_neurosurgery", "source_name": "Harvey Cushing", "target_name": "R. Eustace Semmes"}, {"source": 5, "target": 88, "edge_type": "direct_training", "start_year": 1910, "end_year": 1912, "temporal_range": "1910-1912", "evidence_citation": "PMID: 15007469", "evidence_type": "PMID", "confidence": "high", "notes": "Dandy worked in the Hunterian Laboratory under Cushing before Cushing's departure.", "module": "03_neurosurgery", "source_name": "Harvey Cushing", "target_name": "Walter Dandy"}, {"source": 5, "target": 89, "edge_type": "institutional_founder", "start_year": 1912, "end_year": 1932, "temporal_range": "1912-1932", "evidence_citation": "PMID: 28489324", "evidence_type": "PMID", "confidence": "high", "notes": "Cushing established the first dedicated neurosurgical service at Brigham.", "module": "03_neurosurgery", "source_name": "Harvey Cushing", "target_name": "Peter Bent Brigham Hospital Neurosurgical Program"}, {"source": 5, "target": 90, "edge_type": "direct_training", "start_year": 1918, "end_year": 1921, "temporal_range": "1918-1921", "evidence_citation": "PMID: 1919711", "evidence_type": "PMID", "confidence": "high", "notes": "Penfield graduated from Johns Hopkins Medical School in 1918 and interned under Cushing at Peter Bent Brigham Hospital. Cushing offered him a residency, but Penfield returned to Oxford for the final year of his Rhodes Scholarship. The Cushing surgical ritual \u2014 stemming from Halsted's painstaking operative methods \u2014 played a paramount role in the origins of Penfield's own surgical technique. Penfield later practiced at Columbia Presbyterian before moving to Montreal in 1928.", "module": "03_neurosurgery", "source_name": "Harvey Cushing", "target_name": "Wilder Penfield"}, {"source": 5, "target": 91, "edge_type": "direct_training", "start_year": 1919, "end_year": 1928, "temporal_range": "1919-1928", "evidence_citation": "PMID: 18344917", "evidence_type": "PMID", "confidence": "high", "notes": "Bailey trained under Cushing at Brigham, co-developing tumor classification.", "module": "03_neurosurgery", "source_name": "Harvey Cushing", "target_name": "Percival Bailey"}, {"source": 5, "target": 32, "edge_type": "direct_training", "start_year": 1920, "end_year": 1925, "temporal_range": "1920-1925", "evidence_citation": "Emory_Archive_Elkin", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Elkin completed his surgical residency at Peter Bent Brigham Hospital under Cushing's mentorship before returning to Atlanta.", "module": "03_neurosurgery", "source_name": "Harvey Cushing", "target_name": "Daniel Elkin"}, {"source": 5, "target": 92, "edge_type": "society_founder", "start_year": 1920, "end_year": 1932, "temporal_range": "1920-1932", "evidence_citation": "AANS_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "On March 19, 1920, five months after the ACS formally recognized neurosurgery as a specialty, Cushing hosted 11 surgeons at Peter Bent Brigham Hospital to form the Society of Neurological Surgeons \u2014 the first neurosurgical society in the world. Co-founders included Ernest Sachs, Alfred Adson, Charles Frazier, Gilbert Horrax, and Samuel Harvey. Walter Dandy was invited but declined due to strained relationships with Cushing and Frazier.", "module": "03_neurosurgery", "source_name": "Harvey Cushing", "target_name": "Society of Neurological Surgeons"}, {"source": 88, "target": 93, "edge_type": "institutional_founder", "start_year": 1926, "end_year": 1946, "temporal_range": "1926-1946", "evidence_citation": "PMID: 20305736", "evidence_type": "PMID", "confidence": "high", "notes": "Dandy established the first dedicated neurosurgical intensive care unit.", "module": "03_neurosurgery", "source_name": "Walter Dandy", "target_name": "Johns Hopkins Neurosurgical Intensive Care Unit"}, {"source": 9, "target": 74, "edge_type": "institutional_founder", "start_year": 1929, "end_year": 1947, "temporal_range": "1929-1947", "evidence_citation": "UCSF_Archive_Naffziger", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Naffziger became chair in 1929 and developed a residency program explicitly modeled after Halsted's system, transforming UCSF into a nationally prominent surgical program.", "module": "03_neurosurgery", "source_name": "Howard Naffziger", "target_name": "UCSF Department of Surgery"}, {"source": 5, "target": 94, "edge_type": "society_founder", "start_year": 1931, "end_year": 1939, "temporal_range": "1931-1939", "evidence_citation": "PMID: 7965131", "evidence_type": "PMID", "confidence": "high", "notes": "The Harvey Cushing Society was organized on October 10, 1931, at the Hotel Raleigh in Washington DC. The first formal meeting was held May 6, 1932 in Boston with 23 charter members, mostly Cushing trainees and younger neurosurgeons. R. Glen Spurling and William P. Van Wagenen were the primary organizers; Cushing hosted the Boston meeting and endorsed the effort. William P. Van Wagenen was elected first president. The society addressed the lack of a venue for younger neurosurgeons excluded from the senior Society of Ne ": "1941-1951", "evidence_citation": "UIUC_Archive_Bailey", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Bailey returned to Chicago to direct the newly founded institute.", "module": "03_neurosurgery", "source_name": "Percival Bailey", "target_name": "University of Illinois Neuropsychiatric Institute"}, {"source": 87, "target": 98, "edge_type": "society_founder", "start_year": 1950, "end_year": 1951, "temporal_range": "1950-1951", "evidence_citation": "AANS_Archive_History", "evidence_type": "institutional_archive", "confidence": "moderate", "notes": "The CNS was the first inclusive neurosurgical society with no membership cap. Arthur Morris, acting upon conversations with Semmes, organized the effort to form the society. Elmer C. Schultz, Semmes' associate at the Semmes-Murphey Clinic since 1948, became the CNS's founding president. The first formal meeting was convened in Memphis in November 1951 \u2014 Semmes' home city and sphere of influence. While Semmes did not formally hold office, his inspiration, institutional infrastructure, and trainees were the catalysts for the CNS's creation. Confidence marked moderate because the link is catalytic rather than organizational.", "module": "03_neurosurgery", "source_name": "R. Eustace Semmes", "target_name": "Congress of Neurological Surgeons"}, {"source": 94, "target": 99, "edge_type": "institutional_succession", "start_year": 1967, "end_year": 1967, "temporal_range": "1967", "evidence_citation": "AANS_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "At its 1967 annual meeting in San Francisco, the Harvey Cushing Society formally changed its name to the American Association of Neurological Surgeons, reflecting its evolution from an intimate collegial club to the primary professional organization for American neurosurgery with over 12,000 members today.", "module": "03_neurosurgery", "source_name": "Harvey Cushing Society", "target_name": "American rative Orthopaedics (1939), which remains the definitive textbook in the field.", "module": "06_orthopedics", "source_name": "Willis Campbell", "target_name": "Campbell Clinic"}, {"source": 132, "target": 135, "edge_type": "society_founder", "start_year": 1931, "end_year": 1933, "temporal_range": "1931-1933", "evidence_citation": "ABOS_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "In 1931, the AOA formed a committee to establish a more broadly representative national orthopaedic organization without the AOA's membership restrictions. This committee directly catalyzed the founding of the AAOS in 1933.", "module": "06_orthopedics", "source_name": "American Orthopaedic Association", "target_name": "American Academy of Orthopaedic Surgeons"}, {"source": 133, "target": 135, "edge_type": "society_founder", "start_year": 1933, "end_year": 1935, "temporal_range": "1933-1935", "evidence_citation": "PMID: 18196369", "evidence_type": "PMID", "confidence": "high", "notes": "Campbell co-founded the AAOS and served as its first elected president at the inaugural meeting held at Northwestern University in January 1933. The AAOS grew from the American Orthopaedic Association's 1931 committee to establish a broadly representative national orthopaedic society. It is now the world's largest musculoskeletal association with over 39,000 members.", "module": "06_orthopedics", "source_name": "Willis Campbell", "target_name": "American Academy of Orthopaedic Surgeons"}, {"source": 132, "target": 136, "edge_type": "society_founder", "start_year": 1933, "end_year": 1934, "temporal_range": "1933-1934", "evidence_citation": "ABOS_Archive_History", "evidence_type": "institutional_archive", "confidence": "high", "notes": "A second AOA committee in 1931 was charged with establishing an orthopaedic specialty board. In January 1933 the AOA recommended the composition of the board, and in February 1934 the ABOS was officially incorporated with representatives from the AOA, AAOS, and AMA Section on Orthopaedic Surgery.", "module": "06_orthopedics", "source_name": "American Orthopaedic Association", "target_name": "American Board of Orthopaedic Surgery"}, {"source": 130, "target": 137, "edge_type": "institutional_succession", "start_year": 1940, "end_year": 1955, "temporal_range": "1940-1955", "evidence_citation": "PMID: 19048348", "evidence_type": "PMID", "confidence": "high", "notes": "Levine DB. 'The Hospital for the Ruptured and Crippled renamed the Hospital for Special Surgery 1940; the war years 1941-1945.' HSS J. 2009 Feb;5(1):1-8. In 1940, the Board of Managers under surgeon-in-chief Philip D. Wilson changed the name from Hospital for the Ruptured and Crippled to Hospital for Special Surgery (HSS). Wilson had been recruited in 1935 to revitalize the institution, and the renaming reflected the modernization of the hospital from a 19th-century charitable institution to a modern academic orthopaedic center. HSS affiliated with Cornell University Medical College and New York Hospital in 1949-1951. This succession edge closes the gap between the existing R&C institutional node (Knight 1863, Gibney 1887) and the modern HSS, the oldest orthopaedic hospital in the United States and currently ranked #1 nationally for orthopaedics.", "module": "06_orthopedics", "source_name": "Hospital for the Ruptured and Crippled", "target_name": "Hospital for Special Surgery"}, {"source": 138, "target": 139, "edge_type": "governance_leadership", "start_year": 1955, "end_year": 1984, "temporal_range": "1955-1984", "evidence_citation": "AOA_Archive_Coventry_Pillar", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Coventry was appointed chairman of the Mayo Clinic Department of Orthopedics in 1955, serving until his retirement in 1984. He had joined Mayo's staff in 1942, interrupted by WWII service in the Medical Corps of the US Naval Reserve (Guadalcanal, New Guinea, Philippines). He attended the University of Michigan before joining Mayo. Under his chairmanship, Mayo's orthopedic department performed the first FDA-approved cemented total hip arthroplasty in the US (1969), established the first total joint registry (1969), pioneered cortisone use for orthopedic injuries (early 1950s), and popularized the proximal tibial osteotomy (1960). This creates a new institutional node for Mayo orthopedics, distinct from the existing Mayo Clinic Department of Surgery (general surgery, Wangensteen lineage).", "module": "06_orthopedics", "source_name": "Mark B. Coventry", "target_name": "Mayo Clinic Department of Orthopedic Surgery"}, {"source": 140, "target": 141, "edge_type": "institutional_founder", "start_year": 1962, "end_year": 1982, "temporal_range": "1962-1982", "evidence_citation": "PMID: 20852975", "evidence_type": "PMID", "confidence": "high", "notes": "Brand RA. 'Biographical Sketch: Sir John Charnley MD, 1911-1982.' Clin Orthop Relat Res. 2010 Dec;468(12):3147-8. Charnley (1911-1982) established the Centre for Hip Surgery at Wrightington Hospital in Lancashire, England in 1962, moving his clinical practice from Manchester Royal Infirmary. He performed the first successful low-friction arthroplasty using UHMWPE and acrylic bone cement in November 1962. The Centre became the global epicenter for hip replacement surgery, training visiting surgeons from around the world. Charnley was elected Fellow of the Royal Society (1975, the first practising orthopaedic surgeon), received a CBE (1970), knighthood (1977), and the Lasker Award (1974). His low-friction arthroplasty is the single most impactful orthopaedic innovation of the 20th century. This edge adds the arthroplasty revolution's institutional origin to the graph, paralleling the Gillies\u2192Queen's Hospital pattern in plastic surgery as a British institutional node with profound American influence.", "module": "06_orthopedics", "source_name": "John Charnley", "target_name": "Wrightington Centre for Hip Surgery"}, {"source": 140, "target": 138, "edge_type": "observational_study", "start_year": 1968, "end_year": 1969, "temporal_range": "1968-1969", "evidence_citation": "PMID: 4707443", "evidence_type": "PMID", "confidence": "high", "notes": "Coventry MB. 'The surgical technique of total hip arthroplasty, modified from Charnley, as done at the Mayo Clinic.' Orthop Clin North Am. 1973 Apr;4(2):473-82. Coventry (1913-1994), then chairman of Mayo's Department of Orthopedics, traveled to Europe in the late 1960s to study hip replacement procedures and visited Charnley at Wrightington. According to Bernard Morrey (Coventry's successor): 'Coventry thought that Charnley's approach and philosophy was the most sound.' Coventry returned to Rochester and performed the first FDA-approved total hip arthroplasty using methylmethacrylate in the United States on March 10, 1969. Coventry's own 1973 publication explicitly titles the Mayo technique as 'modified from Charnley,' documenting the direct knowledge transfer. This observational_study edge parallels the Blair\u2192Gillies edge in plastic surgery as a transatlantic knowledge bridge that launched an American specialty program.", "module": "06_orthopedics", "source_name": "John Charnley", "target_name": "Mark B. Coventry"}, {"source": 138, "target": 132, "edge_type": "governance_leadership", "start_year": 1977, "end_year": 1978, "temporal_range": "1977-1978", "evidence_citation": "AOA_Archive_Coventry_Pillar", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Coventry served as president of the American Orthopaedic Association in 1977, as documented by the AOA's Pillar of the Orthopaedic Profession program honoring him. He also served as president of the Clinical Orthopaedic Society, The Hip Society, and the Orthopaedic Research and Education Foundation (OREF). His AOA presidency connects the arthroplasty lineage (Charnley\u2192Coventry) back to the existing AOA node in the graph, creating a chain from Wrightington through Mayo to the professional society that founded both AAOS and ABOS. Coventry published over 250 articles and 31 book chapters and established the Mayo Clinic Total Hip Registry in 1969, the first ongoing large-scale arthroplasty outcomes registry.", "module": "06_orthopedics", "source_name": "Mark B. Coventry", "target_name": "American Orthopaedic Association"}, {"source": 17, "target": 142, "edge_type": "direct_training", "start_year": 1935, "end_year": 1939, "temporal_range": "1935-1939", "evidence_citation": "PMID: 3524368", "evidence_type": "PMID", "confidence": "high", "notes": "Clark completed his surgical fellowship at Mayo, representing the shift to institutional training.", "module": "07_oncology_trials", "source_name": "Mayo Clinic Department of Surgery", "target_name": "R. Lee Clark"}, {"source": 143, "target": 144, "edge_type": "institutional_founder", "start_year": 1940, "end_year": 1975, "temporal_range": "1940-1975", "evidence_citation": "PMID: 32193716", "evidence_type": "PMID", "confidence": "high", "notes": "Balch CM. 'Special Article Celebrating SSO 80th Anniversary: William Stewart MacComb \u2014 The Father of the Society of Surgical Oncology (SSO) and a Pioneering Surgical Oncologist.' Ann Surg Oncol. 2021 Sep;28(9):4794-4804. Documents that five Memorial Hospital surgeons led by William MacComb founded the James Ewing Society on June 10, 1940 at the Hotel Lexington in New York as an alumni organization for Memorial Hospital's Surgery Department. The society was renamed SSO in 1975. MacComb was elected first president (1940-1942) and served three terms. While start_year is 1940 (not 1990s), this edge is critical because it connects the existing MSK institutional node (Memorial Hospital for Cancer and Allied Diseases, already in graph) to the existing SSO society node, which currently has only one edge (James Ewing Society\u2192SSO succession, 1975). This fills a structural gap by documenting the founding origin, and the MSK\u2192SSO chain connects the oncology institutional trunk to the surgical oncology governance network.", "module": "07_oncology_trials", "source_name": "Memorial Hospital for Cancer and Allied Diseases", "target_name": "Society of Surgical Oncology"}, {"source": 142, "target": 145, "edge_type": "institutional_founder", "start_year": 1946, "end_year": 1978, "temporal_range": "1946-1978", "evidence_citation": "MDA_Archive_Clark", "evidence_type": "institutional_archive", "confidence": "high", "notes": "Clark served as the founding director and surgeon-in-chief.", "module": "07_oncology_trials", "source_name": "R. Lee Clark", "target_name": "MD Anderson Cancer Center"}, {"source": 49, "target": 146, "edge_type": "direct_training", "start_year": 1950, "end_year": 1957, "temporal_range": "1950-1957", "evidence_citation": "PMID: 34991349", "evidence_type": "PMID", "confidence": "high", "notes": "Fisher completed a surgical research fellowship under Ravdin at the University of Pennsylvania in 1950. Ravdin later personally recruited Fisher in 1957 to join the NIH Cancer Chemotherapy meeting that became the NSABP. Fisher described Ravdin as his mentor: 'Since Dr. Ravdin was an army general who had operated on President Eisenhower, when he commanded me to attend the meeting, I did so.' This edge connects the Penn institutional trunk to the existing NSABP/clinical trials lineage in the graph.", "module": "07_oncology_trials", "source_name": "I.S. Ravdin", "target_name": "Bernard Fisher"}, {"source": 147, "target": 148, "edge_type": "programmatic_accreditation", "start_year": 1956, "end_year": 2026, "temporal_range": "1956-Present", "evidence_citation": "SWOG_Archive_ACS", "evidence_type": "institutional_archive", "confidence": "moderate", "notes": "The ACS Commission on Cancer and surgical quality programs heavily intersect with SWOG protocols to enforce surgical standards within NCI trials.", "module": "07_oncology_trials", "source_name": "American College of Surgeons", "target_name": "SWOG Cancer
